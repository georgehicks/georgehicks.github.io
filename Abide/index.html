<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#14171C" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="description" content="Abide — rest in the Vine. Realignment, Scripture, verse match." />
<title>Abide — Rest in the Vine</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<style>
  :root {
    --bg: #14171C; --surface: #1B1F26; --surface-2: #232832; --border: #2E3440;
    --ink: #ECE8DF; --ink-muted: #9AA0AC; --ink-faint: #5B6270;
    --brass: #CD9A4E; --brass-strong: #E4B268; --teal: #5FA98C; --rust: #C1614A;
    --font-display: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#F5F1E8; --surface:#FFFFFF; --surface-2:#EDE7D8; --border:#DDD5C0;
      --ink:#201C15; --ink-muted:#6B6455; --ink-faint:#A79E8A;
      --brass:#A9782F; --brass-strong:#8C6224; --teal:#3F8367; --rust:#A8432C; }
  }
  :root[data-theme="dark"] { --bg:#14171C; --surface:#1B1F26; --surface-2:#232832; --border:#2E3440;
    --ink:#ECE8DF; --ink-muted:#9AA0AC; --ink-faint:#5B6270;
    --brass:#CD9A4E; --brass-strong:#E4B268; --teal:#5FA98C; --rust:#C1614A; }
  :root[data-theme="light"] { --bg:#F5F1E8; --surface:#FFFFFF; --surface-2:#EDE7D8; --border:#DDD5C0;
    --ink:#201C15; --ink-muted:#6B6455; --ink-faint:#A79E8A;
    --brass:#A9782F; --brass-strong:#8C6224; --teal:#3F8367; --rust:#A8432C; }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink); font-family: var(--font-body);
    line-height: 1.5; font-size: 16px; -webkit-tap-highlight-color: transparent;
  }
  button, input, textarea { font-family: inherit; color: inherit; }
  button { cursor: pointer; }
  :focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }

  .page { min-height: 100vh; padding: calc(1.25rem + env(safe-area-inset-top, 0px)) 1.1rem calc(3rem + env(safe-area-inset-bottom, 0px)); }
  .wrap { max-width: 28rem; margin: 0 auto; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.4rem; min-height: 2rem; }
  .wordmark { font-family: var(--font-display); font-size: 1.3rem; background: none; border: none; color: var(--ink); padding: 0; }
  .topbar-right { display: flex; align-items: center; gap: 0.75rem; }
  .streak-badge { font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink-muted); }
  .streak-badge b { color: var(--brass-strong); font-variant-numeric: tabular-nums; }
  .link-btn {
    background: none; border: none; color: var(--ink-muted); font-size: 0.85rem;
    padding: 0.3rem 0.1rem; border-bottom: 1px solid transparent;
  }
  .link-btn:hover { color: var(--ink); border-color: var(--border); }
  .icon-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    width: 2rem; height: 2rem; display: flex; align-items: center; justify-content: center;
    color: var(--ink-muted); font-size: 0.95rem;
  }
  .exit-link { display: none; color: var(--rust); }
  .topbar.in-session .topbar-right { display: none; }
  .topbar.in-session .exit-link { display: inline-block; }

  .view { display: none; }
  .view.active { display: block; }

  .greet-sub { font-size: 0.85rem; color: var(--ink-muted); margin: 0 0 0.15rem; }
  .greet { font-family: var(--font-display); font-weight: 400; font-size: 1.65rem; margin: 0 0 1.2rem; text-wrap: balance; }

  .cta {
    width: 100%; border: none; text-align: left;
    background: linear-gradient(160deg, var(--brass-strong), var(--brass));
    color: #1B1305; border-radius: 16px; padding: 1.1rem 1.2rem;
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem;
  }
  .cta.secondary {
    background: var(--surface); color: var(--ink); border: 1px solid var(--border);
  }
  .cta.secondary .cta-arrow { color: var(--ink-muted); }
  .cta-title { font-weight: 700; font-size: 1.02rem; }
  .cta-meta { font-family: var(--font-mono); font-size: 0.7rem; opacity: 0.85; margin-top: 0.2rem; letter-spacing: 0.03em; }
  .cta-arrow { font-size: 1.3rem; }

  .section-label {
    font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-faint); margin: 1.4rem 0 0.7rem;
  }

  .stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.55rem; margin-bottom: 0.4rem; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 0.7rem 0.55rem; text-align: center;
  }
  .stat-num {
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    font-weight: 700; font-size: 1.15rem; color: var(--brass-strong);
  }
  .stat-lbl { font-size: 0.65rem; color: var(--ink-muted); margin-top: 0.15rem; }

  .note-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 1rem 1.05rem; margin-bottom: 0.75rem; font-size: 0.9rem; color: var(--ink-muted);
  }
  .note-card strong { color: var(--ink); font-weight: 600; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
  .chip {
    border: 1px solid var(--border); background: var(--surface); color: var(--ink-muted);
    border-radius: 999px; padding: 0.35rem 0.7rem; font-size: 0.78rem;
  }
  .chip.active { background: var(--brass); color: #1B1305; border-color: var(--brass); font-weight: 600; }
  .chip.selected { background: color-mix(in srgb, var(--teal) 22%, var(--surface)); color: var(--teal); border-color: var(--teal); }
  .chip .cnt { font-family: var(--font-mono); font-size: 0.7rem; opacity: 0.85; margin-left: 0.2rem; }

  .verse-card, .pattern-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 0.95rem 1rem; margin-bottom: 0.65rem;
  }
  .verse-card-head, .pattern-head {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 0.6rem; margin-bottom: 0.45rem;
  }
  .verse-ref { font-family: var(--font-display); font-size: 1.02rem; color: var(--brass-strong); }
  .verse-group-tag {
    font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-faint); white-space: nowrap;
  }
  .verse-text {
    font-family: var(--font-display); font-style: italic; font-size: 0.95rem;
    line-height: 1.55; color: var(--ink); margin: 0 0 0.65rem;
  }
  .verse-stats { display: flex; align-items: center; gap: 0.55rem; flex-wrap: wrap; }
  .hit-pill, .miss-pill, .none-pill {
    font-family: var(--font-mono); font-size: 0.7rem; font-variant-numeric: tabular-nums;
    border-radius: 6px; padding: 0.2rem 0.45rem;
  }
  .hit-pill { background: color-mix(in srgb, var(--teal) 18%, transparent); color: var(--teal); }
  .miss-pill { background: color-mix(in srgb, var(--rust) 18%, transparent); color: var(--rust); }
  .none-pill { background: var(--surface-2); color: var(--ink-faint); }
  .accuracy-mini { font-family: var(--font-mono); font-size: 0.7rem; color: var(--ink-muted); margin-left: auto; }

  .session-stage { display: flex; flex-direction: column; min-height: 20rem; }
  .exercise-track { display: flex; gap: 3px; margin: 0 0 1.3rem; flex-wrap: nowrap; overflow: hidden; }
  .exercise-track span { flex: 1; height: 4px; border-radius: 2px; background: var(--border); min-width: 4px; }
  .exercise-track span.done { background: var(--teal); }
  .exercise-track span.now { background: var(--brass); }
  .exercise-track span.miss { background: var(--rust); }
  .exercise-track span.realigned { background: var(--brass-strong); }

  .stage-instruction { font-size: 0.88rem; color: var(--ink-muted); margin: 0 0 0.9rem; text-align: center; }
  .prompt-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 1.25rem 1.15rem; margin-bottom: 1.1rem; text-align: center;
  }
  .prompt-ref { font-family: var(--font-display); font-size: 1.55rem; color: var(--brass-strong); margin: 0; }
  .prompt-text {
    font-family: var(--font-display); font-style: italic; font-size: 1.05rem;
    line-height: 1.55; margin: 0; text-wrap: balance;
  }
  .assertion-text {
    font-family: var(--font-display); font-size: 1.35rem; line-height: 1.45;
    margin: 0; text-wrap: balance; color: var(--ink);
  }
  .mode-tag, .step-tag {
    font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 0.65rem; text-align: center;
  }
  .tier-label {
    font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--brass-strong); text-align: center; margin: 0 0 0.75rem;
  }

  .choice-list, .gate-row { display: flex; flex-direction: column; gap: 0.55rem; }
  .gate-row.row { flex-direction: row; }
  .gate-row.row .choice-btn, .gate-row.row .gate-btn { flex: 1; text-align: center; }
  .choice-btn, .gate-btn {
    text-align: left; width: 100%;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 0.85rem 0.95rem; color: var(--ink); font-size: 0.9rem; line-height: 1.4;
  }
  .gate-btn.primary {
    background: var(--brass); color: #1B1305; border-color: var(--brass); font-weight: 700; text-align: center;
  }
  .gate-btn.soft { text-align: center; }
  .choice-btn:disabled, .gate-btn:disabled { cursor: default; }
  .choice-btn.correct {
    border-color: var(--teal); background: color-mix(in srgb, var(--teal) 14%, var(--surface)); color: var(--teal);
  }
  .choice-btn.wrong {
    border-color: var(--rust); background: color-mix(in srgb, var(--rust) 12%, var(--surface)); color: var(--rust);
  }
  .choice-btn.dim { opacity: 0.45; }
  .choice-ref { font-family: var(--font-display); font-size: 1rem; color: inherit; }

  .continue-btn, .cta-btn {
    font-weight: 600; font-size: 0.92rem;
    background: var(--brass); color: #1B1305; border: none; border-radius: 12px;
    padding: 0.75rem 1.6rem; margin-top: 1rem; width: 100%;
  }
  .continue-btn:disabled { opacity: 0.4; }
  .continue-btn.secondary, .cta-btn.secondary {
    background: var(--surface); color: var(--ink); border: 1px solid var(--border);
  }

  .feedback { margin-top: 0.9rem; min-height: 1.4rem; text-align: center; font-size: 0.9rem; }
  .fb-ok { color: var(--teal); font-weight: 600; }
  .fb-bad { color: var(--rust); font-weight: 600; }

  .summary { text-align: center; padding-top: 1.2rem; }
  .summary-big {
    font-family: var(--font-mono); font-size: 2.6rem; font-weight: 700;
    color: var(--brass-strong); margin-bottom: 0.35rem;
  }
  .summary-sub { color: var(--ink-muted); font-size: 0.9rem; margin-bottom: 1.2rem; }

  .browse-toolbar {
    display: flex; align-items: center; justify-content: space-between; gap: 0.6rem;
    margin-bottom: 0.85rem;
  }
  .browse-meta { font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink-muted); }

  .field-label {
    font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-faint); margin: 0.9rem 0 0.45rem;
  }
  .text-input, .text-area {
    width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px;
    padding: 0.75rem 0.85rem; color: var(--ink); font-size: 0.95rem;
  }
  .text-area { min-height: 5.5rem; resize: vertical; line-height: 1.45; }
  .text-input:focus, .text-area:focus { border-color: var(--brass); outline: none; }

  .linked-verse {
    margin-top: 0.85rem; padding: 0.75rem 0.85rem; border-radius: 12px;
    background: var(--surface-2); border: 1px solid var(--border); text-align: left;
  }
  .linked-verse .lv-ref { font-family: var(--font-mono); font-size: 0.72rem; color: var(--brass-strong); margin-bottom: 0.25rem; }
  .linked-verse .lv-text { font-family: var(--font-display); font-style: italic; font-size: 0.88rem; line-height: 1.45; color: var(--ink-muted); }

  .bar-row { display: flex; align-items: center; gap: 0.55rem; margin-bottom: 0.5rem; }
  .bar-label { font-size: 0.78rem; color: var(--ink-muted); width: 9rem; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { flex: 1; height: 8px; border-radius: 4px; background: var(--surface-2); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--brass), var(--brass-strong)); }
  .bar-fill.teal { background: linear-gradient(90deg, var(--teal), color-mix(in srgb, var(--teal) 70%, white)); }
  .bar-fill.rust { background: linear-gradient(90deg, var(--rust), color-mix(in srgb, var(--rust) 70%, white)); }
  .bar-n { font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink-muted); width: 1.6rem; text-align: right; }

  .history-strip { display: flex; gap: 4px; margin-bottom: 0.5rem; }
  .history-strip i {
    flex: 1; height: 22px; border-radius: 4px; background: var(--surface-2);
    display: block; border: 1px solid var(--border);
  }
  .history-strip i.ok { background: color-mix(in srgb, var(--teal) 45%, var(--surface-2)); border-color: var(--teal); }
  .history-strip i.partial { background: color-mix(in srgb, var(--brass) 40%, var(--surface-2)); border-color: var(--brass); }
  .history-strip i.hard { background: color-mix(in srgb, var(--rust) 35%, var(--surface-2)); border-color: var(--rust); }

  .identity-chip-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0.5rem 0 0.8rem; }
  .id-chip {
    border: 1px solid var(--border); background: var(--surface-2); color: var(--ink);
    border-radius: 999px; padding: 0.4rem 0.75rem; font-size: 0.82rem;
  }
  .id-chip .n {
    font-family: var(--font-mono); font-size: 0.7rem; color: var(--brass-strong); margin-left: 0.3rem;
  }
  .id-chip.picked { border-color: var(--brass); background: color-mix(in srgb, var(--brass) 18%, var(--surface)); }

  .empty-note { color: var(--ink-muted); font-size: 0.88rem; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="wrap">

    <div class="topbar" id="topbar">
      <button class="wordmark" id="wordmark-home" type="button">Abide</button>
      <div class="topbar-right">
        <span class="streak-badge" id="streak-badge"></span>
        <button class="link-btn" id="patterns-link" type="button">Patterns</button>
        <button class="icon-btn" id="theme-toggle" type="button" aria-label="Toggle theme">◐</button>
      </div>
      <button class="link-btn exit-link" id="exit-session-btn" type="button">Exit</button>
    </div>

    <!-- HOME -->
    <div class="view active" data-view="home">
      <p class="greet-sub" id="home-date"></p>
      <h1 class="greet">Rest in the Vine</h1>

      <button class="cta" id="btn-realign" type="button">
        <div>
          <div class="cta-title">Realignment session</div>
          <div class="cta-meta" id="realign-cta-meta">Assertions · confess · return</div>
        </div>
        <div class="cta-arrow">→</div>
      </button>

      <button class="cta secondary" id="btn-browse" type="button">
        <div>
          <div class="cta-title">Scripture catalog</div>
          <div class="cta-meta" id="browse-cta-meta">38 verses · last 30 days</div>
        </div>
        <div class="cta-arrow">→</div>
      </button>

      <button class="cta secondary" id="btn-challenge" type="button">
        <div>
          <div class="cta-title">Verse match</div>
          <div class="cta-meta" id="challenge-cta-meta">Ref ↔ text · both directions</div>
        </div>
        <div class="cta-arrow">→</div>
      </button>

      <div class="section-label">Last 30 days</div>
      <div class="stat-row" id="home-stats"></div>

      <div class="section-label">Realignment · 14 days</div>
      <div class="history-strip" id="home-history-strip"></div>
    </div>

    <!-- BROWSE -->
    <div class="view" data-view="browse">
      <div class="browse-toolbar">
        <button class="link-btn" id="browse-home" type="button">← Home</button>
        <span class="browse-meta" id="browse-count"></span>
      </div>
      <h1 class="greet" style="font-size:1.4rem;margin-bottom:0.85rem">Scripture</h1>
      <button class="cta" id="browse-play" type="button" style="margin-bottom:1rem">
        <div>
          <div class="cta-title">Play match challenge</div>
          <div class="cta-meta">Hits &amp; misses counted · 30 days</div>
        </div>
        <div class="cta-arrow">→</div>
      </button>
      <div class="chip-row" id="group-chips"></div>
      <div id="verse-list"></div>
    </div>

    <!-- CHALLENGE -->
    <div class="view" data-view="challenge">
      <div class="exercise-track" id="challenge-track"></div>
      <div class="session-stage" id="challenge-stage">
        <div id="challenge-round"></div>
        <div id="challenge-summary" style="display:none"></div>
      </div>
    </div>

    <!-- REALIGNMENT SESSION -->
    <div class="view" data-view="realign">
      <div class="exercise-track" id="realign-track"></div>
      <div class="session-stage" id="realign-stage"></div>
    </div>

    <!-- PATTERNS -->
    <div class="view" data-view="patterns">
      <div class="browse-toolbar">
        <button class="link-btn" id="patterns-home" type="button">← Home</button>
        <span class="browse-meta">Last 30 days</span>
      </div>
      <h1 class="greet" style="font-size:1.4rem;margin-bottom:0.5rem">Patterns</h1>
      <p class="greet-sub" style="margin-bottom:1rem">Feelings, false beliefs, friction, and identity over time.</p>
      <div id="patterns-body"></div>
    </div>

  </div>
</div>

<script src="content/verses.js"></script>
<script src="content/assertions.js"></script>
<script src="content/index.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function () {});
  }
</script>
</body>
</html>
