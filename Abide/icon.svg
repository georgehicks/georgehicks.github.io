<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#14171C"/>
  <!-- Dial rim -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#2E3440" stroke-width="18"/>
  <circle cx="414" cy="256" r="8" fill="#5B6270"/>
  <circle cx="256" cy="414" r="8" fill="#5B6270"/>
  <circle cx="98" cy="256" r="8" fill="#5B6270"/>
  <!-- Needle, turned slightly off true north -->
  <g transform="rotate(-11 256 256)">
    <polygon points="256,148 277,256 235,256" fill="#CD9A4E"/>
    <polygon points="235,256 277,256 256,348" fill="#5B6270"/>
  </g>
  <circle cx="256" cy="256" r="17" fill="#14171C" stroke="#ECE8DF" stroke-width="7"/>
  <!-- True north, marked with a cross -->
  <line x1="256" y1="116" x2="256" y2="163" stroke="#ECE8DF" stroke-width="7" stroke-linecap="round"/>
  <line x1="245" y1="132" x2="267" y2="132" stroke="#ECE8DF" stroke-width="7" stroke-linecap="round"/>
</svg>
