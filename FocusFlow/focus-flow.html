<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00ffcc">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FocusFlow">
  <link rel="manifest" href="manifest.json">
  <title>Focus Flow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root { --primary: #00ffcc; --bg: #0f1117; --card: #1a1f2e; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: #ddd;
      margin: 0 auto; padding: 10px; width: 380px;
    }

    .top-header { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
    .calendar { flex: 1; background: var(--card); border-radius: 10px; padding: 4px 5px;
                font-size: 0.76rem; height: 140px; overflow: hidden; box-sizing: border-box; }
    .calendar-header { text-align: center; font-weight: 600; margin-bottom: 2px; color: var(--primary); font-size: 0.8rem; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; text-align: center; }
    .calendar-grid div { padding: 2px 1px; border-radius: 3px; }
    .calendar-grid .header { color: #555; font-size: 0.62rem; }
    .calendar-grid .today { background: var(--primary); color: #000; font-weight: bold; }

    .clock-container { width: 140px; height: 140px; flex-shrink: 0; }

    .tabs { display: flex; background: #252b3d; border-radius: 6px; padding: 3px; margin-bottom: 8px; }
    .tab { flex: 1; padding: 4px; text-align: center; border-radius: 4px; cursor: pointer; font-size: 0.82rem; font-weight: 500; }
    .tab.active { background: var(--card); color: var(--primary); }

    .section { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 12px; }

    .timeline { height: calc(100dvh - 250px); min-height: 320px; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; }

    /* Refined, subtle scrollbars */
    .timeline, .notes, .pick-list, .today-summary { scrollbar-width: thin; scrollbar-color: rgba(120,140,180,0.28) transparent; }
    .timeline::-webkit-scrollbar, .notes::-webkit-scrollbar, .pick-list::-webkit-scrollbar, .today-summary::-webkit-scrollbar { width: 7px; height: 7px; }
    .timeline::-webkit-scrollbar-track, .notes::-webkit-scrollbar-track, .pick-list::-webkit-scrollbar-track, .today-summary::-webkit-scrollbar-track { background: transparent; }
    .timeline::-webkit-scrollbar-thumb, .notes::-webkit-scrollbar-thumb, .pick-list::-webkit-scrollbar-thumb, .today-summary::-webkit-scrollbar-thumb { background: rgba(120,140,180,0.25); border-radius: 10px; }
    .timeline::-webkit-scrollbar-thumb:hover, .notes::-webkit-scrollbar-thumb:hover, .pick-list::-webkit-scrollbar-thumb:hover, .today-summary::-webkit-scrollbar-thumb:hover { background: rgba(120,140,180,0.45); }

    /* Hour rows — readable scaffold */
    .time-block {
      display: flex; align-items: center; padding: 5px 12px; margin-bottom: 2px;
      background: #1a1f30; border-radius: 6px; font-size: 0.88rem; cursor: pointer;
      transition: all 0.2s; line-height: 1.1; position: relative;
    }
    .time-block:hover { background: #222840; }
    .time-block.past { opacity: 0.45; cursor: default; }

    /* Future magnified 10m blocks */
    .time-block.magnified {
      background: #212840 !important;
      border: none;
    }
    .time-block.magnified .time-label { color: #6878a8; }
    .time-block.magnified .block-input { color: #7888b0; }
    .time-block.magnified .block-input::placeholder { color: #485070; }

    /* Current 10m block — the hero */
    .time-block.magnified.current {
      background: #252e44 !important;
      border: 2px solid var(--primary);
      padding: 10px 12px 18px;
    }
    .time-block.magnified.current .time-label { font-size: 1rem; color: var(--primary); font-weight: 600; }
    .time-block.magnified.current .block-input { font-size: 1rem; color: #ddd; }
    .time-block.magnified.current .block-input::placeholder { color: #4a6070; }

    /* New current slot — blink a ring around it for its first 10s to announce itself.
       Uses outline (not border-color) so it isn't fought over by the hour-target !important rules. */
    @keyframes slot-blink-outline { 0%, 100% { outline-color: var(--primary); } 50% { outline-color: transparent; } }
    .time-block.magnified.current.slot-blink {
      outline: 2px solid var(--primary); outline-offset: 2px;
      animation: slot-blink-outline 0.9s ease-in-out infinite;
    }

    /* Past magnified blocks — faded but still readable */
    .time-block.magnified.past { background: #171b28 !important; opacity: 0.4; border-color: transparent !important; }

    /* Hour-target (:50) — dim gold */
    .time-block.magnified.hour-target { border-color: #4a3c00 !important; }
    .time-block.magnified.hour-target .time-label { color: #7a6200; }
    .time-block.magnified.current.hour-target { border-color: var(--primary) !important; }
    .hour-goal-input { flex:1; background:transparent; border:none; color:#8898b8; font-size:0.82rem; font-style:italic; margin-left:6px; min-width:0; }
    .hour-goal-input::placeholder { color:#404860; }
    .hour-check { font-size:1rem; margin-left:4px; flex-shrink:0; cursor:pointer; color:#2a3050; user-select:none; transition:color 0.15s; }
    .hour-check.checked { color:#4caf50; }
    .time-block.has-logs { flex-wrap: wrap; }
    .hour-logs { width:100%; padding: 2px 0 3px 78px; display:flex; gap:10px; }
    .hour-log-entry { font-size:0.75rem; color:#6070a0; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:140px; }
    .hour-log-time { color:#506080; margin-right:3px; }

    .appointment-tag { background: #00ffcc; color: #000; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; margin-left: 4px; white-space: nowrap; }
    .appt-chip { background: rgba(0,255,204,0.12); color: #00ffcc; font-size: 0.68rem; padding: 1px 5px; border-radius: 3px; margin-left: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px; min-width: 0; flex-shrink: 0; cursor: default; }

    .progress-container { position: absolute; bottom: 3px; left: 12px; right: 12px; height: 4px; background: #252b3d; border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #00ffcc, #ffcc00); width: 100%; transition: width 1s linear; }

    .time-label { width: 78px; color: #7080a0; font-size: 0.85rem; flex-shrink: 0; }
    .block-input { flex: 1; background: transparent; border: none; color: #8090b0; font-size: 0.9rem; outline: none; }
    .magnified-window { border: 2px solid rgba(0,255,204,0.5); border-radius: 10px; padding: 3px; margin-bottom: 6px; background: rgba(0,255,204,0.04); }

    /* Main notes section */
    .notes { min-height: 80px; resize: vertical; width: 100%; background: #151a28; border: 1px solid #252b40; border-radius: 0 6px 6px 6px; color: #ccd; font-family: inherit; font-size: 0.88rem; padding: 8px 10px; outline: none; }
    .notes-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0; }
    .notes-tabs { display: flex; gap: 2px; }
    .notes-tab { padding: 3px 12px; border-radius: 5px 5px 0 0; cursor: pointer; font-size: 0.8rem; color: #557; background: #111620; border: 1px solid #252b40; border-bottom: none; }
    .notes-tab.active { background: #151a28; color: var(--primary); }
    .export-btn { background: none; border: none; color: #445; font-size: 1.2rem; cursor: pointer; padding: 0 2px; line-height: 1; }
    .export-btn:hover { color: #aaa; }

    /* Deliverables list view — tap a line for its action menu; Raw toggles the plain textarea */
    .deliv-controls { display: flex; justify-content: flex-end; gap: 6px; margin-top: 10px; margin-bottom: 6px; }
    .deliv-ctl { background: #1a2030; border: 1px solid #2a3555; color: #8ab4f8; border-radius: 7px; padding: 5px 12px; font-size: 0.78rem; font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .deliv-ctl.active { color: var(--primary); border-color: rgba(0,255,204,0.4); }
    .deliv-list { min-height: 40px; }
    .deliv-row { padding: 10px; border-radius: 8px; margin-bottom: 2px; font-size: 0.92rem; color: #ccd; background: #151a28; border: 1px solid transparent; cursor: pointer; overflow-wrap: anywhere; white-space: pre-wrap; -webkit-tap-highlight-color: transparent; }
    .deliv-row.header { background: transparent; font-weight: 600; color: #dde; margin-top: 4px; }
    .deliv-row.task { margin-left: 10px; }
    .deliv-row.done { color: #556; text-decoration: line-through; }
    .deliv-row.selected { background: #1e2740; border-color: rgba(0,255,204,0.35); }
    .deliv-row.spacer { height: 8px; padding: 0; margin: 0; background: transparent; cursor: default; }
    .deliv-menu { display: flex; gap: 5px; padding: 6px 2px 10px; margin-left: 10px; }
    .deliv-menu-btn {
      flex: 1; padding: 10px 2px; border-radius: 9px; border: 1px solid #2a3555; background: #1a2030;
      color: #ccd; font-family: inherit; font-size: 0.76rem; font-weight: 600; cursor: pointer;
      white-space: nowrap; -webkit-tap-highlight-color: transparent;
    }
    .deliv-menu-btn:active { transform: scale(0.96); }
    .deliv-menu-btn.complete { color: #00ffcc; border-color: rgba(0,255,204,0.4); }
    .deliv-menu-btn.edit { color: #ffd580; border-color: rgba(255,213,128,0.4); }
    .deliv-menu-btn.newtask { color: #8ab4f8; border-color: rgba(138,180,248,0.4); }
    .deliv-menu-btn.delete { color: #ff8a80; border-color: rgba(255,138,128,0.4); }
    .deliv-edit-row { margin: 2px 0 2px 10px; display: flex; gap: 5px; }
    .deliv-edit-row input { flex: 1; min-width: 0; background: #10141f; border: 1px solid var(--primary); border-radius: 8px; color: #dde; font-family: inherit; font-size: 0.92rem; padding: 10px; outline: none; }
    .deliv-nav-btn { width: 40px; flex-shrink: 0; border-radius: 8px; border: 1px solid #2a3555; background: #1a2030; color: #8ab4f8; font-size: 1rem; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .deliv-nav-btn:active { transform: scale(0.94); }
    .checklist-card { background:#151a28; border:1px solid #252b40; border-radius:8px; padding:10px 12px; margin-bottom:8px; }
    .checklist-card-label { font-size:0.95rem; font-weight:600; color:#dde; margin-bottom:3px; }
    .checklist-card-meta { font-size:0.76rem; color:#7a8aa8; margin-bottom:2px; }
    .checklist-card-status { font-size:0.74rem; color:#566; margin-bottom:8px; }
    .checklist-card .deliv-menu { margin-left:0; padding:0; }

    .celebrate-burst { position: fixed; left: 50%; bottom: 90px; width: 0; height: 0; z-index: 60; pointer-events: none; }
    .celebrate-particle {
      position: absolute; left: 0; top: 0; font-size: 1.1rem; transform: translate(-50%, -50%);
      animation: celebrate-fly 0.7s ease-out forwards; opacity: 0;
    }
    @keyframes celebrate-fly {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(0.6); }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.15); }
    }

    /* Compact plan form */
    .plan-form { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .plan-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .plan-input { background: #151a28; border: 1px solid #252b40; border-radius: 5px; color: #aab; font-size: 0.78rem; padding: 4px 7px; width: 100%; outline: none; font-family: inherit; }
    .plan-input::placeholder { color: #445; }
    .plan-btn { background: var(--primary); color: #000; border: none; border-radius: 5px; padding: 4px 10px; font-size: 0.78rem; font-weight: 700; cursor: pointer; white-space: nowrap; }

    /* Tap-to-pick appointment times */
    .time-pills { display:flex; gap:6px; }
    .time-pill { flex:1; background:#151a28; border:1px solid #252b40; color:#99a; border-radius:6px; padding:6px 9px; font-size:0.8rem; cursor:pointer; font-family:inherit; text-align:left; }
    .time-pill.active { border-color:var(--primary); color:#dde; }
    .time-pill span { color:var(--primary); font-weight:700; margin-left:3px; }
    .chip-row { display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
    .chip-label { color:#5a6480; font-size:0.68rem; width:24px; flex-shrink:0; }
    .tchip { background:#1a2030; border:1px solid #2a3350; color:#9aa8c8; border-radius:13px; padding:4px 9px; font-size:0.78rem; cursor:pointer; font-family:inherit; }
    .tchip.sel { background:rgba(0,255,204,0.15); border-color:var(--primary); color:var(--primary); }

    /* Pick tab */
    .pick-list { background:#151a28; border:1px solid #252b40; border-radius:0 6px 6px 6px; padding:8px 10px; min-height:max(300px, calc(100dvh - 260px)); }
    .pick-item { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:0.9rem; }
    .pick-item.step { padding-left:18px; font-size:0.84rem; color:#9aabbd; }
    .pick-item .ptext { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .prio-badge { width:24px; height:24px; flex-shrink:0; border-radius:50%; border:1.5px solid #38415c; color:#566; display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:700; cursor:pointer; user-select:none; background:transparent; }
    .prio-badge.p1 { border-color:#00ffcc; color:#00ffcc; background:rgba(0,255,204,0.12); }
    .prio-badge.p2 { border-color:#ffcc00; color:#ffcc00; background:rgba(255,204,0,0.12); }
    .prio-badge.p3 { border-color:#ff8866; color:#ff8866; background:rgba(255,136,102,0.12); }
    .pick-item.due-checklist { padding-bottom:8px; margin-bottom:4px; border-bottom:1px dashed #252b40; }
    .pick-item.due-checklist .prio-badge { border-style:dashed; }
    .due-tag { font-size:0.62rem; color:#8ab4f8; border:1px solid #2a3555; background:#1a2030; border-radius:5px; padding:1px 5px; margin-left:4px; }
    .pick-empty, .today-empty { color:#556; font-size:0.85rem; padding:8px 2px; }

    /* Today summary (read-only) */
    .today-summary { background:#151a28; border:1px solid #252b40; border-radius:0 6px 6px 6px; padding:10px 12px; min-height:max(300px, calc(100dvh - 260px)); }
    .today-summary.compact { min-height:0; padding:8px 10px; }
    .today-row { display:flex; align-items:center; gap:8px; padding:3px 0; font-size:0.9rem; }
    .today-dot { width:17px; height:17px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0.68rem; font-weight:700; color:#0f1117; }
    .today-dot.p1 { background:#00ffcc; } .today-dot.p2 { background:#ffcc00; } .today-dot.p3 { background:#ff8866; }
    .today-row .tparent { color:#566; }
    .today-row .t-txt { flex:1; min-width:0; cursor:pointer; border-radius:4px; transition:color 0.15s ease, background 0.15s ease; }
    .today-row .t-txt:hover { background:#1e2436; }
    .today-row .t-txt.added-flash { color:#00ffcc; }
    .today-done { margin-left:auto; background:none; border:1px solid #2a3350; color:#6a7a55; border-radius:6px; font-size:0.8rem; cursor:pointer; padding:1px 8px; flex-shrink:0; }
    .today-done:hover { color:#4caf50; border-color:#3a5a30; }

    /* Focus block tray */
    .time-block.magnified { flex-wrap: wrap; }
    .tray { width:100%; display:flex; flex-wrap:wrap; gap:5px; padding:6px 0 2px; }
    .tray-chip { background:#222a40; border:1px solid #313a58; color:#aeb8d8; font-size:0.78rem; padding:3px 9px; border-radius:12px; cursor:pointer; white-space:nowrap; max-width:100%; overflow:hidden; text-overflow:ellipsis; }
    .tray-chip:hover { background:#2c3656; color:#dde; }
    .tray-chip .tc-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; vertical-align:middle; }
    .tray-chip .tc-dot.p1{background:#00ffcc;} .tray-chip .tc-dot.p2{background:#ffcc00;} .tray-chip .tc-dot.p3{background:#ff8866;}
    .tray-chip.same { background:#243047; border-color:#3a4a70; color:#cfe0ff; }

  </style>
</head>
<body>

  <!-- Compact header: smaller calendar + bigger clock -->
  <div class="top-header">
    <div class="calendar">
      <div id="calendar-header" class="calendar-header"></div>
      <div id="calendar-grid" class="calendar-grid"></div>
    </div>

    <div class="clock-container">
      <svg id="analog-clock" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
        <circle cx="70" cy="70" r="62" fill="none" stroke="#333" stroke-width="10"/>
        <g id="clock-marks"></g>
        <line id="hour-hand" x1="70" y1="70" x2="70" y2="42" stroke="#ddd" stroke-width="6" stroke-linecap="round"/>
        <line id="minute-hand" x1="70" y1="70" x2="70" y2="28" stroke="#00ffcc" stroke-width="4" stroke-linecap="round"/>
        <line id="second-hand" x1="70" y1="70" x2="70" y2="22" stroke="#ff4444" stroke-width="2" stroke-linecap="round"/>
        <circle cx="70" cy="70" r="5" fill="#ddd"/>
      </svg>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div id="tab-plan" class="tab active" onclick="switchTab(0)">Plan</div>
    <div id="tab-focus" class="tab" onclick="switchTab(1)">Focus</div>
    <div id="tab-settings" class="tab" onclick="switchTab(2)">Settings</div>
  </div>

  <!-- PLAN TAB -->
  <div id="panel-plan" class="section">
    <!-- Plan sub-tabs: Cal / Deliverables / Pick / Lists / Today -->
    <div style="margin-top:0;">
      <div class="notes-header">
        <div class="notes-tabs">
          <span class="notes-tab" data-target="plan-cal">Cal</span>
          <span class="notes-tab active" data-target="plan-deliverables">Deliverables</span>
          <span class="notes-tab" data-target="plan-pick">Pick</span>
          <span class="notes-tab" data-target="plan-lists">Lists</span>
          <span class="notes-tab" data-target="plan-today">Today</span>
        </div>
        <button class="export-btn" onclick="exportData()" title="Export today's data">📤</button>
      </div>
      <div id="plan-cal" class="subpanel" style="display:none;">
        <div class="plan-form">
          <input id="plan-text" type="text" class="plan-input" placeholder="Appointment title">
          <div class="time-pills">
            <button type="button" id="pill-start" class="time-pill active" onclick="setTarget('start')">Start<span id="pill-start-val">—</span></button>
            <button type="button" id="pill-end" class="time-pill" onclick="setTarget('end')">End<span id="pill-end-val">—</span></button>
          </div>
          <div class="chip-row" id="hour-chips"></div>
          <div class="chip-row" id="min-chips"></div>
          <div class="chip-row" id="dur-chips"></div>
          <button onclick="addAppointment()" class="plan-btn" style="width:100%;">+ Add Appointment</button>
        </div>
        <div id="appointment-list"></div>
      </div>
      <div id="plan-deliverables" class="subpanel">
        <div class="deliv-controls">
          <button type="button" class="deliv-ctl" onclick="delivAppend()">+ Add</button>
          <button type="button" class="deliv-ctl" id="deliv-raw-btn" onclick="toggleDelivRaw()">Raw</button>
        </div>
        <div id="deliv-list" class="deliv-list"></div>
        <textarea id="deliverables-notes" class="notes sync-notes" data-key="deliverables" placeholder="One deliverable per line.&#10;Indent its steps below it:&#10;- one at a time (only next shows) · -- any order&#10;Ship the report&#10;- draft outline&#10;- pull numbers&#10;-- get feedback from Sam" style="display:none; min-height:200px;"></textarea>
        <textarea id="daily-notes" class="notes sync-notes" data-key="dailyNotes" placeholder="Quick notes…" style="margin-top:10px; min-height:90px;"></textarea>
      </div>
      <div id="plan-pick" class="subpanel" style="display:none;">
        <div id="pick-list" class="pick-list"></div>
      </div>
      <div id="plan-lists" class="subpanel" style="display:none;">
        <button type="button" class="plan-btn" id="btn-new-checklist" style="margin-bottom:8px;">+ New list</button>
        <div id="checklist-form-wrap" style="display:none; margin-bottom:10px;"></div>
        <div id="checklist-cards"></div>
      </div>
      <div id="plan-today" class="subpanel" style="display:none;">
        <div id="today-summary" class="today-summary"></div>
      </div>
    </div>
  </div>

  <!-- FOCUS TAB -->
  <div id="panel-focus" class="section" style="display:none;">
    <div id="focus-timeline" class="timeline"></div>
    <div id="focus-notes-section" style="margin-top:10px;">
      <div class="notes-header">
        <div class="notes-tabs">
          <span class="notes-tab active" data-target="focus-today">Today</span>
          <span class="notes-tab" data-target="focus-notes">Notes</span>
        </div>
      </div>
      <div id="focus-today" class="subpanel">
        <div id="focus-today-summary" class="today-summary compact"></div>
      </div>
      <div id="focus-notes" class="subpanel" style="display:none;">
        <textarea id="focus-daily-notes" class="notes sync-notes" data-key="dailyNotes" placeholder="Quick notes, brain dump…" style="min-height:120px;"></textarea>
      </div>
    </div>
  </div>

  <!-- SETTINGS TAB -->
  <div id="panel-settings" class="section" style="display:none;">
    <div style="margin-bottom:16px;">
      <strong>Speech Feedback</strong><br>
      <select id="speech-mode" style="width:100%; padding:8px; margin-top:4px;">
        <option value="hourly">Hourly</option>
        <option value="30">Every 30 minutes</option>
        <option value="none">None</option>
      </select>
      <button onclick="testSpeech()" style="width:100%; margin-top:4px; padding:8px;">Test Speech</button>
    </div>
    <div style="margin-bottom:16px;">
      <strong>Interval Feedback</strong><br>
      <select id="tenmin-interval" style="width:100%; padding:8px; margin-top:4px;">
        <option value="5">Every 5 minutes</option>
        <option value="6">Every 6 minutes</option>
        <option value="10" selected>Every 10 minutes</option>
        <option value="12">Every 12 minutes</option>
        <option value="15">Every 15 minutes</option>

      <select id="tenmin-mode" style="width:100%; padding:8px; margin-top:4px;">

      <strong>Day Range</strong><br>

    <div style="margin-top:20px; padding-top:16px; border-top:1px solid #252b3d;">
      <strong>Calendar Import (ICS)</strong>
      <textarea id="ics-url" rows="2" placeholder="Published .ics URLs — one per line (Outlook, Google, …)" style="width:100%; padding:8px; margin-top:6px; background:#252b3d; color:#ddd; border:1px solid #333; border-radius:6px; font-family:inherit; resize:vertical;"></textarea>
      <input id="ics-proxy" type="text" placeholder="CORS proxy URL (ends with ?url=)" style="width:100%; padding:8px; margin-top:6px; background:#252b3d; color:#ddd; border:1px solid #333; border-radius:6px;">
      <label style="display:block; margin-top:8px; font-size:0.85rem;"><input type="checkbox" id="ics-auto"> Auto-pull when the app opens</label>
      <button onclick="pullCalendar()" style="width:100%; margin-top:8px; padding:10px; background:#1a2030; color:#8ab4f8; border:1px solid #2a3555; border-radius:8px; cursor:pointer;">Pull appointments now</button>
      <div id="ics-status" style="color:#888; font-size:0.8rem; margin-top:6px;"></div>
    </div>
    <div style="margin-top:20px; padding-top:16px; border-top:1px solid #252b3d;">
      <strong>Recover Notes</strong><br>
      <div style="color:#888; font-size:0.8rem; margin-top:4px;">Auto-saved snapshots, in case a stray edit wipes something out.</div>
      <select id="recover-key" style="width:100%; padding:8px; margin-top:8px; background:#252b3d; color:#ddd; border:1px solid #333; border-radius:6px;">
        <option value="deliverables">Deliverables</option>
        <option value="dailyNotes">Daily Notes</option>
      </select>
      <div id="recover-list" style="margin-top:8px;"></div>
    </div>
    <div style="margin-top:20px; padding-top:16px; border-top:1px solid #252b3d;">
      <strong>Reset</strong><br>
      <button onclick="resetDay()" style="width:100%; margin-top:8px; padding:10px; background:#2a1a1a; color:#ff6b6b; border:1px solid #5a2020; border-radius:8px; cursor:pointer;">🗑 Reset Today's Notes &amp; Goals</button>
    </div>
    <div style="margin-top:20px; padding-top:16px; border-top:1px solid #252b3d;">
      <button onclick="navigator.serviceWorker.getRegistration().then(r => r ? r.update().then(() => location.reload()) : location.reload())" style="width:100%; padding:10px; background:#1a2030; color:#8899cc; border:1px solid #2a3555; border-radius:8px; cursor:pointer;">↺ Refresh App</button>
    </div>
  </div>


  <!-- ICS calendar parser -->
  <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>

  <script>
    const storage = { data: {}, get(k){try{return JSON.parse(localStorage.getItem(k));}catch(e){return this.data[k]||null;}}, set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){this.data[k]=v;}} };

    // ---- Notes snapshot history (recover from an edit that accidentally wipes a field) ----
    const NOTES_HISTORY_KEYS = ['deliverables', 'dailyNotes'];
    const NOTES_CHECKPOINT_MS = 20000;
    let lastNotesCheckpoint = {};
    function notesHistoryKey(key) { return `notesHistory_${key}`; }
    function getNotesHistory(key) { return storage.get(notesHistoryKey(key)) || []; }
    function pushNotesHistory(key, value) {
      if (!value || !value.trim()) return;
      const hist = getNotesHistory(key);
      if (hist.length && hist[0].value === value) return;
      hist.unshift({ value, ts: Date.now() });
      storage.set(notesHistoryKey(key), hist.slice(0, 5));
    }
    // Snapshot the previous value before an edit overwrites it: immediately if the
    // text just shrank a lot (likely an accidental select-all + type), otherwise
    // throttled so normal typing doesn't spam the history with near-duplicates.
    function checkpointNotes(key, oldValue, newValue) {
      if (!oldValue || !oldValue.trim()) return;
      const now = Date.now();
      const droppedBig = oldValue.length > 20 && newValue.length < oldValue.length * 0.5;
      const stale = !lastNotesCheckpoint[key] || (now - lastNotesCheckpoint[key] > NOTES_CHECKPOINT_MS);
      if (droppedBig || stale) {
        pushNotesHistory(key, oldValue);
        lastNotesCheckpoint[key] = now;
      }
    }

    function todayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    let startHour = storage.get('startHour') ?? 7;
    let endHour   = storage.get('endHour')   ?? 21;

    function getCurrentWindowStart() {
      const h = new Date().getHours();
      return Math.max(startHour, Math.min(endHour - 1, h)) * 60;
    }

    let progressBarInterval = null;

    let appointments = storage.get('appointments') || [];
    function saveAppointments() { storage.set('appointments', appointments); }

    // ---- Calendar import (ICS) ----
    function icsStatus(m) { const el = document.getElementById('ics-status'); if (el) el.textContent = m; }

    function parseTodayEvents(icsText) {
      const comp = new ICAL.Component(ICAL.parse(icsText));
      const now = new Date();
      const dayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const dayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
      const toMin = d => d.getHours() * 60 + d.getMinutes();
      const results = [];
      const add = (startJs, endJs, summary, uid) => {
        if (startJs >= dayEnd || endJs <= dayStart) return;       // not today
        const s = startJs < dayStart ? 0 : toMin(startJs);
        const e = endJs >= dayEnd ? 1439 : toMin(endJs);
        if (e <= s) return;
        results.push({ uid, start: s, end: e, text: summary || '(busy)' });
      };
      comp.getAllSubcomponents('vevent').forEach(ve => {
        const event = new ICAL.Event(ve);
        if (event.startDate && event.startDate.isDate) return;    // skip all-day
        if (event.isRecurring()) {
          const it = event.iterator();
          let next, guard = 0;
          while ((next = it.next()) && guard++ < 5000) {
            const startJs = next.toJSDate();
            if (startJs >= dayEnd) break;
            const det = event.getOccurrenceDetails(next);
            const endJs = det.endDate.toJSDate();
            if (endJs <= dayStart) continue;
            add(startJs, endJs, event.summary, (event.uid || 'e') + '_' + next.toUnixTime());
          }
        } else {
          add(event.startDate.toJSDate(), event.endDate.toJSDate(), event.summary, event.uid || ('e' + Math.random().toString(36).slice(2)));
        }
      });
      results.sort((a, b) => a.start - b.start);
      return results;
    }

    async function pullCalendar() {
      const urls = (document.getElementById('ics-url')?.value || '').split('\n').map(s => s.trim()).filter(Boolean);
      const proxy = (document.getElementById('ics-proxy')?.value || '').trim();
      if (!urls.length) return icsStatus('Enter at least one calendar .ics URL.');
      if (typeof ICAL === 'undefined') return icsStatus('Calendar library still loading — try again in a moment.');
      icsStatus('Fetching…');
      let all = [], ok = 0, failed = 0;
      for (const url of urls) {
        try {
          const res = await fetch(proxy ? proxy + encodeURIComponent(url) : url);
          if (!res.ok) throw new Error('HTTP ' + res.status);
          all = all.concat(parseTodayEvents(await res.text()));
          ok++;
        } catch (e) { failed++; }
      }
      if (ok === 0) return icsStatus('All fetches failed — check the URLs and proxy (see CALENDAR-SETUP).');
      // de-dupe identical events that appear on more than one calendar
      const seen = new Set();
      const merged = all.filter(ev => { const k = ev.start + '|' + ev.end + '|' + ev.text; if (seen.has(k)) return false; seen.add(k); return true; });
      appointments = appointments.filter(a => a.source !== 'ics');     // refresh imported, keep manual
      merged.forEach((ev, i) => appointments.push({ id: 'ics_' + i + '_' + ev.uid, startMinutes: ev.start, endMinutes: ev.end, text: ev.text, source: 'ics' }));
      saveAppointments();
      renderPlanList();
      if (typeof renderTimePicker === 'function') renderTimePicker();
      if (document.getElementById('panel-focus').style.display !== 'none') buildFocusTimeline();
      storage.set('icsLastPull', Date.now());
      icsStatus(`Imported ${merged.length} event${merged.length === 1 ? '' : 's'} from ${ok} calendar${ok === 1 ? '' : 's'}${failed ? `, ${failed} failed` : ''} · ${new Date().toLocaleTimeString()}`);
    }

    function formatAMPM(minutes) {
      let h = Math.floor(minutes / 60);
      const m = minutes % 60;
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `${h}:${m.toString().padStart(2, '0')} ${ampm}`;
    }

    function minutesToDate(minutes) {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate(), Math.floor(minutes / 60), minutes % 60);
    }

    function shortText(text, maxWords = 2, maxChars = 12) {
      const words = text.trim().split(/\s+/);
      let s = words.slice(0, maxWords).join(' ');
      if (s.length > maxChars) s = s.slice(0, maxChars - 1) + '…';
      return s;
    }

    function parseTime(str) {
      const match = str.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
      if (!match) return null;
      let h = parseInt(match[1]);
      const m = parseInt(match[2]);
      const ampm = match[3].toUpperCase();
      if (ampm === 'PM' && h !== 12) h += 12;
      if (ampm === 'AM' && h === 12) h = 0;
      return h * 60 + m;
    }

    // ---- Tap-to-pick appointment times ----
    let apptStart = null, apptEnd = null, apptTarget = 'start';
    let sH = null, sM = 0, eH = null, eM = 0, lastDur = null;
    const DUR_LABELS = { 15:'+15m', 30:'+30m', 45:'+45m', 60:'+1h', 90:'+90m', 120:'+2h' };

    function hourChipLabel(h) { const ap = h < 12 ? 'a' : 'p'; return (h % 12 || 12) + ap; }

    function setTarget(t) { apptTarget = t; renderTimePicker(); }

    function syncEndFromDur() {
      if (lastDur != null && apptStart != null) {
        apptEnd = apptStart + lastDur; eH = Math.floor(apptEnd / 60); eM = apptEnd % 60;
      }
    }

    function pickHour(h) {
      if (apptTarget === 'start') { sH = h; apptStart = sH * 60 + sM; syncEndFromDur(); }
      else { eH = h; apptEnd = eH * 60 + eM; lastDur = null; }
      renderTimePicker();
    }
    function pickMin(m) {
      if (apptTarget === 'start') { sM = m; if (sH != null) { apptStart = sH * 60 + sM; syncEndFromDur(); } }
      else { eM = m; if (eH != null) { apptEnd = eH * 60 + eM; lastDur = null; } }
      renderTimePicker();
    }
    function pickDur(d) {
      if (apptStart == null) { apptTarget = 'start'; renderTimePicker(); return; }
      lastDur = d; apptEnd = apptStart + d; eH = Math.floor(apptEnd / 60); eM = apptEnd % 60;
      apptTarget = 'end';
      renderTimePicker();
    }

    function renderTimePicker() {
      const hourRow = document.getElementById('hour-chips');
      if (!hourRow) return;
      const minRow = document.getElementById('min-chips');
      const durRow = document.getElementById('dur-chips');

      document.getElementById('pill-start').classList.toggle('active', apptTarget === 'start');
      document.getElementById('pill-end').classList.toggle('active', apptTarget === 'end');
      document.getElementById('pill-start-val').textContent = apptStart != null ? formatAMPM(apptStart) : '—';
      document.getElementById('pill-end-val').textContent = apptEnd != null ? formatAMPM(apptEnd) : '—';

      const curH = apptTarget === 'start' ? sH : eH;
      const curM = apptTarget === 'start' ? sM : eM;

      hourRow.innerHTML = '<span class="chip-label">Hr</span>';
      for (let h = startHour; h <= endHour; h++) {
        const c = document.createElement('button');
        c.type = 'button';
        c.className = 'tchip' + (curH === h ? ' sel' : '');
        c.textContent = hourChipLabel(h);
        c.addEventListener('click', () => pickHour(h));
        hourRow.appendChild(c);
      }

      minRow.innerHTML = '<span class="chip-label">Min</span>';
      [0, 15, 30, 45].forEach(m => {
        const c = document.createElement('button');
        c.type = 'button';
        c.className = 'tchip' + (curH != null && curM === m ? ' sel' : '');
        c.textContent = ':' + String(m).padStart(2, '0');
        c.addEventListener('click', () => pickMin(m));
        minRow.appendChild(c);
      });

      durRow.innerHTML = '<span class="chip-label">Len</span>';
      [15, 30, 45, 60, 90, 120].forEach(d => {
        const c = document.createElement('button');
        c.type = 'button';
        const sel = apptStart != null && apptEnd != null && (apptEnd - apptStart) === d;
        c.className = 'tchip' + (sel ? ' sel' : '');
        c.textContent = DUR_LABELS[d];
        c.addEventListener('click', () => pickDur(d));
        durRow.appendChild(c);
      });
    }

    function addAppointment() {
      const text = document.getElementById('plan-text').value.trim();
      if (!text) return alert('Enter an appointment title');
      if (apptStart == null || apptEnd == null) return alert('Tap a start and end time');
      if (apptEnd <= apptStart) return alert('End time must be after start time');
      appointments.push({ id: Date.now(), startMinutes: apptStart, endMinutes: apptEnd, text });
      saveAppointments();
      renderPlanList();
      document.getElementById('plan-text').value = '';
      apptStart = apptEnd = null; sH = null; sM = 0; eH = null; eM = 0; lastDur = null; apptTarget = 'start';
      renderTimePicker();
    }

    function deleteAppointment(id) {
      appointments = appointments.filter(a => a.id !== id);
      saveAppointments();
      renderPlanList();
    }

    function appendCalRefresh(container) {
      if (!((storage.get('icsUrl') || '').trim())) return; // only when a calendar is configured
      const link = document.createElement('button');
      link.textContent = '↻ Refresh from calendar';
      link.style.cssText = 'display:block;margin-top:8px;background:none;border:none;color:#8ab4f8;font-size:0.8rem;cursor:pointer;padding:0;text-decoration:underline;';
      link.addEventListener('click', () => { link.textContent = '↻ Refreshing…'; pullCalendar(); });
      container.appendChild(link);
    }

    function renderPlanList() {
      const container = document.getElementById('appointment-list');
      container.innerHTML = '';
      if (appointments.length === 0) {
        container.innerHTML = '<div style="color:#555;font-size:0.85rem;margin-top:8px;">No appointments.</div>';
        appendCalRefresh(container);
        return;
      }
      appointments.sort((a,b) => a.startMinutes - b.startMinutes);
      appointments.forEach(appt => {
        const div = document.createElement('div');
        div.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:6px;';
        div.innerHTML = `<span style="color:#888;font-size:0.88rem;">${formatAMPM(appt.startMinutes)} – ${formatAMPM(appt.endMinutes)}</span><span class="appointment-tag">${appt.source === 'ics' ? '📅 ' : ''}${appt.text}</span>`;
        const del = document.createElement('button');
        del.textContent = '✕';
        del.style.cssText = 'margin-left:auto;background:none;border:none;color:#555;cursor:pointer;font-size:1rem;padding:0 4px;flex-shrink:0;';
        del.addEventListener('click', () => deleteAppointment(appt.id));
        div.appendChild(del);
        container.appendChild(div);
      });
      const clearAll = document.createElement('button');
      clearAll.textContent = 'Clear all appointments';
      clearAll.style.cssText = 'margin-top:8px;background:none;border:none;color:#555;font-size:0.8rem;cursor:pointer;padding:0;text-decoration:underline;';
      clearAll.addEventListener('click', () => {
        if (confirm('Remove all appointments?')) {
          appointments = [];
          saveAppointments();
          renderPlanList();
        }
      });
      container.appendChild(clearAll);
      appendCalRefresh(container);
    }

    // FOCUS TAB
    let windowStartMinutes = getCurrentWindowStart();

    function scrollCurrentBlockIntoView() {
      const container = document.getElementById('focus-timeline');
      if (!container) return;
      const cur = container.querySelector('.time-block.magnified.current');
      const target = cur || container.querySelector('.magnified-window');
      if (!target) return;
      const top = target.getBoundingClientRect().top - container.getBoundingClientRect().top + container.scrollTop;
      const offset = cur ? Math.max(12, (container.clientHeight - cur.clientHeight) / 2) : 12;
      container.scrollTop = Math.max(0, top - offset);
    }

    // Blink the current slot's border for its first 10s, so a new time slot
    // announces itself — unless you're already typing in it.
    let lastCurrentBlockSeen = null;
    let blinkBlockMinutes = null;
    let blinkTimer = null;

    function buildFocusTimeline() {
      const container = document.getElementById('focus-timeline');
      const notesSection = document.getElementById('focus-notes-section');
      // If the user is typing in the docked notes, remember focus+caret so reparenting doesn't drop it
      const ae = document.activeElement;
      const keepFocus = notesSection && ae && notesSection.contains(ae)
        ? { el: ae, s: ae.selectionStart, e: ae.selectionEnd } : null;
      if (notesSection) document.getElementById('panel-focus').appendChild(notesSection); // park safely before clearing
      container.innerHTML = '';
      let magWindow = null;

      const now = new Date();
      const nowMinutes = now.getHours() * 60 + now.getMinutes();

      const winStart = minutesToDate(windowStartMinutes);
      const winEnd = minutesToDate(windowStartMinutes + 60);

      const curBlock = currentBlockMinutes();
      const today = todayKey();

      if (curBlock !== lastCurrentBlockSeen) {
        lastCurrentBlockSeen = curBlock;
        blinkBlockMinutes = curBlock;
        clearTimeout(blinkTimer);
        blinkTimer = setTimeout(() => {
          blinkBlockMinutes = null;
          const blinkInput = document.getElementById(`block-input-${curBlock}`);
          const blinkBlock = blinkInput && blinkInput.closest('.time-block');
          if (blinkBlock) blinkBlock.classList.remove('slot-blink');
        }, 10000);
      }

      for (let h = startHour; h < endHour; h++) {
        const hourMinutes = h * 60;
        const hourIsPast = nowMinutes >= hourMinutes + 60;

        const hourGoalKey = `hourGoal_${today}_${hourMinutes}`;
        const hourGoalVal = storage.get(hourGoalKey) || '';

        const hourBlock = document.createElement('div');
        hourBlock.className = 'time-block' + (hourIsPast ? ' past' : '');

        const hourTimeEl = document.createElement('div');
        hourTimeEl.className = 'time-label';
        hourTimeEl.innerHTML = `<strong>${formatAMPM(hourMinutes)}</strong>`;
        hourBlock.appendChild(hourTimeEl);

        const hourAppts = appointments.filter(a =>
          (a.startMinutes >= hourMinutes && a.startMinutes < hourMinutes + 60) ||
          (a.endMinutes > hourMinutes && a.endMinutes <= hourMinutes + 60)
        );
        hourAppts.forEach(a => {
          const chip = document.createElement('span');
          chip.className = 'appt-chip';
          chip.textContent = shortText(a.text);
          chip.title = `${formatAMPM(a.startMinutes)}–${formatAMPM(a.endMinutes)}: ${a.text}`;
          hourBlock.appendChild(chip);
        });

        // Hour-level goal input — flows into the :50 block as its target
        const goalInput = document.createElement('input');
        goalInput.type = 'text';
        goalInput.className = 'hour-goal-input';
        goalInput.placeholder = 'hour goal…';
        goalInput.value = hourGoalVal;
        goalInput.readOnly = hourIsPast;
        goalInput.addEventListener('input', () => {
          storage.set(hourGoalKey, goalInput.value);
          // Live-update the :50 block placeholder
          const targetInput = document.getElementById(`block-input-${hourMinutes + 50}`);
          if (targetInput) targetInput.placeholder = goalInput.value || 'did you hit it?';
        });
        hourBlock.appendChild(goalInput);

        const checkKey = `hourCheck_${today}_${hourMinutes}`;
        const check = document.createElement('span');
        check.className = 'hour-check' + (storage.get(checkKey) ? ' checked' : '');
        check.textContent = '✓';
        check.title = 'Mark hour as well spent';
        check.addEventListener('click', () => {
          const now = !storage.get(checkKey);
          storage.set(checkKey, now ? '1' : '');
          check.classList.toggle('checked', now);
        });
        hourBlock.appendChild(check);

        // Show last 1–2 block log entries for this hour as a preview
        const snippets = [];
        const snipInterval = getInterval();
        for (let sm = 60 - snipInterval; sm >= 0 && snippets.length < 2; sm -= snipInterval) {
          const val = storage.get(`block_${today}_${hourMinutes + sm}`);
          if (val && val.trim()) snippets.unshift({ time: formatAMPM(hourMinutes + sm), text: val.trim() });
        }
        if (snippets.length > 0) {
          hourBlock.classList.add('has-logs');
          const logsDiv = document.createElement('div');
          logsDiv.className = 'hour-logs';
          snippets.forEach(s => {
            const entry = document.createElement('span');
            entry.className = 'hour-log-entry';
            entry.title = s.text; // full text on hover
            entry.innerHTML = `<span class="hour-log-time">${s.time}</span>${s.text.length > 36 ? s.text.slice(0, 36) + '…' : s.text}`;
            logsDiv.appendChild(entry);
          });
          hourBlock.appendChild(logsDiv);
        }

        container.appendChild(hourBlock);

        const winWrapper = document.createElement('div');
        winWrapper.className = 'magnified-window';

        const interval = getInterval();
        for (let m = 0; m < 60; m += interval) {
          const blockMinutes = hourMinutes + m;
          const blockTime = minutesToDate(blockMinutes);
          if (blockTime < winStart || blockTime >= winEnd) continue;

          const isCurrent = blockMinutes === curBlock;
          const isPast = blockMinutes + interval <= nowMinutes;
          const overlapping = appointments.filter(a => a.startMinutes < blockMinutes + interval && a.endMinutes > blockMinutes);

          const block = document.createElement('div');
          block.className = 'time-block magnified';
          if (isCurrent) {
            block.classList.add('current');
            if (blinkBlockMinutes === blockMinutes) block.classList.add('slot-blink');
          }
          if (isPast)                           block.classList.add('past');
          if (m === 60 - interval && !isPast)   block.classList.add('hour-target');

          // Time label
          const timeEl = document.createElement('div');
          timeEl.className = 'time-label';
          timeEl.textContent = formatAMPM(blockMinutes);
          block.appendChild(timeEl);

          // Appointment badges
          if (overlapping.length > 0) {
            overlapping.forEach(a => {
              const chip = document.createElement('span');
              chip.className = 'appt-chip';
              chip.textContent = shortText(a.text, 3, 20);
              chip.title = `${formatAMPM(a.startMinutes)}–${formatAMPM(a.endMinutes)}: ${a.text}`;
              block.appendChild(chip);
            });
          }

          // Note input — persisted per block per day
          const storageKey = `block_${today}_${blockMinutes}`;
          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'block-input';
          input.id = `block-input-${blockMinutes}`;
          const hourGoal = m === 60 - interval ? (storage.get(`hourGoal_${today}_${hourMinutes}`) || '') : '';
          input.placeholder = m === 50 ? (hourGoal || 'did you hit it?') : 'what are you doing?';
          input.value = storage.get(storageKey) || '';
          input.addEventListener('input', () => storage.set(storageKey, input.value));
          input.addEventListener('focus', () => {
            showTray(input);
            if (blinkBlockMinutes === blockMinutes) { blinkBlockMinutes = null; clearTimeout(blinkTimer); }
            block.classList.remove('slot-blink');
          });
          input.addEventListener('blur', () => setTimeout(() => {
            block.querySelectorAll('.tray').forEach(t => t.remove());
          }, 200));
          block.appendChild(input);

          // Progress bar on current block only
          if (isCurrent) {
            const secsIntoBlock = (now.getMinutes() % interval) * 60 + now.getSeconds();
            const pct = Math.max(0, (1 - secsIntoBlock / (interval * 60))) * 100;
            const prog = document.createElement('div');
            prog.className = 'progress-container';
            prog.innerHTML = `<div id="progress-bar" class="progress-bar" style="width:${pct}%"></div>`;
            block.appendChild(prog);
          }

          winWrapper.appendChild(block);
        }

        if (winWrapper.children.length > 0) { container.appendChild(winWrapper); magWindow = winWrapper; }
      }
      // Dock the Today/Notes panel to the footer of the magnified hour so it stays in view
      if (notesSection) (magWindow || container).appendChild(notesSection);
      if (keepFocus) { keepFocus.el.focus({ preventScroll: true }); try { keepFocus.el.setSelectionRange(keepFocus.s, keepFocus.e); } catch (_) {} }
      // Re-center the current block in the timeline on each (re)build, unless editing inside it
      const ae2 = document.activeElement;
      if (!(ae2 && container.contains(ae2) && (ae2.tagName === 'INPUT' || ae2.tagName === 'TEXTAREA'))) scrollCurrentBlockIntoView();
      start10MinProgressBar();
    }

    function start10MinProgressBar() {
      if (progressBarInterval) clearInterval(progressBarInterval);
      const bar = document.getElementById('progress-bar');
      if (!bar) return;
      const now = new Date();
      const interval = getInterval();
      const blockSecs = interval * 60;
      const secsIntoBlock = (now.getMinutes() % interval) * 60 + now.getSeconds();
      let remaining = blockSecs - secsIntoBlock;
      progressBarInterval = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(progressBarInterval);
          buildFocusTimeline(); // advance to next block
          return;
        }
        const b = document.getElementById('progress-bar');
        if (b) b.style.width = (remaining / blockSecs * 100) + '%';
        else clearInterval(progressBarInterval);
      }, 1000);
    }

    function getInterval() {
      return parseInt(document.getElementById('tenmin-interval')?.value ?? 10);
    }

    // ---- Deliverables parsing, today picks, and focus tray ----
    function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

    function getDeliverablesText() {
      const el = document.getElementById('deliverables-notes');
      return (el && el.value) || storage.get('deliverables') || '';
    }

    // Each non-dash line is a deliverable; following lines starting with "-" are its
    // steps. A single "-" is a sequential step (done one at a time — only the next
    // undone one is actionable); "--" is a parallel step (order doesn't matter, so
    // every undone one is actionable at once). See collapseSequentialNextAction.
    function parseDeliverables(text) {
      const items = [];
      (text || '').split('\n').forEach((line, idx) => {
        const raw = line.trim();
        if (!raw) return;
        const done = /\s+DONE$/.test(raw);            // line ends with the DONE marker
        const body = raw.replace(/\s+DONE$/, '').trim();
        if (!body) return;
        if (body[0] === '-' || body[0] === '+') {
          const prefix = body.match(/^[-+]+/)[0];
          const kind = prefix.replace(/\+/g, '').length >= 2 ? 'parallel' : 'sequential';
          const stepText = body.replace(/^[-+]+\s*/, '').trim();
          if (!stepText) return;
          const parent = [...items].reverse().find(i => !i.isStep);
          items.push({ text: stepText, isStep: true, kind, parent: parent ? parent.text : null,
                       key: (parent ? parent.text + ' ▸ ' : '') + stepText, done: done || body[0] === '+', lineIndex: idx });
        } else {
          items.push({ text: body, isStep: false, parent: null, key: body, done, lineIndex: idx });
        }
      });
      return items;
    }

    // Within one parent, only the first undone sequential step is actionable right
    // now; later sequential siblings stay hidden until it's done. Parallel steps
    // («--») and parent lines always pass through untouched.
    function collapseSequentialNextAction(items) {
      const claimed = {};
      return items.filter(it => {
        if (!it.isStep || it.kind !== 'sequential') return true;
        const pkey = it.parent || '';
        if (claimed[pkey]) return false;
        claimed[pkey] = true;
        return true;
      });
    }

    // ---- Recurring checklists (Check-In / Weekly / Monthly / one-off lists) ----
    // Checklists live in their own template list, never mixed into the deliverables
    // text. Once one is due it shows up as an extra option in Pick — not yet part
    // of your plan — and only tapping it there materializes it as an ordinary
    // deliverable (its items as steps), which is when it starts riding the normal
    // Pick/Today/tray/next-action machinery. Finishing all its steps auto-completes
    // it and reschedules it back into template-only limbo.
    // A checklist with no frequencyHours has no cadence at all — it's a standing,
    // non-routine list (e.g. Travel prep) that's always offered as a Pick option,
    // any time, rather than only once some interval has elapsed.
    const DEFAULT_CHECKLISTS = [
      {
        id: 'checkin', label: 'Check-In', frequencyHours: 4,
        items: ['Breathe and connect', 'Any concerns to capture or let go', 'What matters most for the rest of today']
      },
      {
        id: 'weekly', label: 'Weekly planning', frequencyHours: 168,
        items: ['Clear inboxes and notes', 'Review the week ahead', 'Review each open deliverable’s status', 'Pick next actions', 'Someday/maybe sweep']
      },
      {
        id: 'monthly', label: 'Monthly review', frequencyHours: 720,
        items: ['Review progress on goals', 'What’s working, what’s not', 'Anything to drop', 'Look ahead at the calendar']
      },
      {
        id: 'travel', label: 'Travel prep', frequencyHours: null, parallel: true,
        items: ['Check weather and pack accordingly', 'Charge devices and pack chargers', 'Confirm tickets and reservations', 'Pack ID and travel documents', 'Set out-of-office and delegate anything urgent']
      }
    ];

    function getChecklists() {
      let cls = storage.get('checklists');
      if (!cls) {
        cls = DEFAULT_CHECKLISTS.map(c => ({ ...c, lastCompletedAt: null }));
        storage.set('checklists', cls);
      }
      return cls;
    }

    function checklistDue(cl) {
      if (!cl.frequencyHours) return true;   // no cadence — a non-routine list (e.g. Travel) is always available
      if (!cl.lastCompletedAt) return true;
      return (Date.now() - cl.lastCompletedAt) >= cl.frequencyHours * 3600000;
    }

    function isChecklistPendingInDeliverables(cl, delivText) {
      return parseDeliverables(delivText).some(it => !it.isStep && it.text === cl.label && !it.done);
    }

    function checklistBlockText(cl) {
      const prefix = cl.parallel ? '--' : '-';   // parallel: any order · sequential (default): one at a time
      return cl.label + '\n' + cl.items.map(t => prefix + ' ' + t).join('\n');
    }

    function dueChecklistOptions() {
      const text = getDeliverablesText();
      return getChecklists().filter(cl => checklistDue(cl) && !isChecklistPendingInDeliverables(cl, text));
    }

    // Tapping a due checklist in Pick is what actually adds it to today's plan —
    // materialize it into the deliverables text, then pick it like anything else.
    function pickDueChecklist(cl) {
      const text = getDeliverablesText();
      if (!isChecklistPendingInDeliverables(cl, text)) {
        const newText = (text.trim() ? text.replace(/\n+$/, '') + '\n' : '') + checklistBlockText(cl);
        storage.set('deliverables', newText);
        document.querySelectorAll('textarea.sync-notes[data-key="deliverables"]').forEach(el => el.value = newText);
      }
      cyclePriority(cl.label);
    }

    // Any deliverable line whose text matches a checklist's own label, once all of
    // its steps are done, auto-completes and reschedules that checklist.
    function checkChecklistCompletion() {
      const checklists = getChecklists();
      if (!checklists.length) return;
      const items = parseDeliverables(getDeliverablesText());
      let changed = false;
      checklists.forEach(cl => {
        const parent = items.find(it => !it.isStep && it.text === cl.label && !it.done);
        if (!parent) return;
        const steps = items.filter(it => it.isStep && it.parent === cl.label);
        if (steps.length && steps.every(s => s.done)) {
          markLineDoneByIndex(parent.lineIndex);
          cl.lastCompletedAt = Date.now();
          changed = true;
        }
      });
      if (changed) { storage.set('checklists', checklists); renderPick(); renderToday(); }
    }

    // ---- Lists tab: view/create/edit/delete checklist templates ----
    function saveChecklists(list) { storage.set('checklists', list); }

    function describeFrequency(hours) {
      if (!hours) return 'No schedule — always available';
      if (hours % 720 === 0) return hours === 720 ? 'Monthly' : (hours / 720) + ' months';
      if (hours % 168 === 0) return hours === 168 ? 'Weekly' : (hours / 168) + ' weeks';
      if (hours % 24 === 0) return hours === 24 ? 'Daily' : (hours / 24) + ' days';
      return 'Every ' + hours + 'h';
    }

    let checklistFormState = null; // { editingId } or { editingId: null, label, items, frequencyHours, parallel }

    function openNewChecklistForm() {
      checklistFormState = { editingId: null, label: '', items: '', frequencyHours: '', parallel: false };
      renderChecklistForm();
    }

    function openEditChecklistForm(id) {
      const cl = getChecklists().find(c => c.id === id);
      if (!cl) return;
      checklistFormState = {
        editingId: id, label: cl.label, items: cl.items.join('\n'),
        frequencyHours: cl.frequencyHours || '', parallel: !!cl.parallel
      };
      renderChecklistForm();
    }

    function closeChecklistForm() {
      checklistFormState = null;
      renderChecklistForm();
    }

    // Pull whatever's currently typed into the label/items fields back into
    // checklistFormState before a pill click triggers a re-render, so typing
    // isn't lost.
    function syncChecklistFormState() {
      if (!checklistFormState) return;
      const labelEl = document.getElementById('lf-label');
      const itemsEl = document.getElementById('lf-items');
      const freqEl = document.getElementById('lf-frequency');
      const customEl = document.getElementById('lf-custom-hours');
      if (labelEl) checklistFormState.label = labelEl.value;
      if (itemsEl) checklistFormState.items = itemsEl.value;
      if (freqEl) checklistFormState.frequencyHours = freqEl.value === 'custom' ? (customEl ? customEl.value : '') : freqEl.value;
    }

    function renderChecklistForm() {
      const wrap = document.getElementById('checklist-form-wrap');
      if (!wrap) return;
      if (!checklistFormState) { wrap.style.display = 'none'; wrap.innerHTML = ''; return; }
      wrap.style.display = 'block';
      const s = checklistFormState;
      const presets = ['4', '24', '168', '720'];
      const freqVal = s.frequencyHours === '' ? '' : (presets.includes(String(s.frequencyHours)) ? String(s.frequencyHours) : 'custom');
      wrap.innerHTML =
        '<div class="plan-form">' +
          '<input type="text" class="plan-input" id="lf-label" placeholder="List name" value="' + escapeHtml(s.label) + '">' +
          '<textarea class="notes" id="lf-items" placeholder="One item per line" style="min-height:100px;">' + escapeHtml(s.items) + '</textarea>' +
          '<select class="plan-input" id="lf-frequency">' +
            '<option value=""' + (freqVal === '' ? ' selected' : '') + '>No schedule — always available</option>' +
            '<option value="4"' + (freqVal === '4' ? ' selected' : '') + '>Every 4 hours</option>' +
            '<option value="24"' + (freqVal === '24' ? ' selected' : '') + '>Daily</option>' +
            '<option value="168"' + (freqVal === '168' ? ' selected' : '') + '>Weekly</option>' +
            '<option value="720"' + (freqVal === '720' ? ' selected' : '') + '>Monthly</option>' +
            '<option value="custom"' + (freqVal === 'custom' ? ' selected' : '') + '>Custom…</option>' +
          '</select>' +
          '<input type="number" min="1" class="plan-input" id="lf-custom-hours" placeholder="Hours" style="display:' + (freqVal === 'custom' ? 'block' : 'none') + '" value="' + (freqVal === 'custom' ? escapeHtml(String(s.frequencyHours)) : '') + '">' +
          '<div class="time-pills">' +
            '<button type="button" id="lf-kind-seq" class="time-pill' + (!s.parallel ? ' active' : '') + '">One at a time</button>' +
            '<button type="button" id="lf-kind-par" class="time-pill' + (s.parallel ? ' active' : '') + '">Any order</button>' +
          '</div>' +
          '<button type="button" class="plan-btn" id="lf-save" style="width:100%;">' + (s.editingId ? 'Save changes' : 'Add list') + '</button>' +
          '<button type="button" class="plan-btn" id="lf-cancel" style="width:100%; background:#333; color:#ccd;">Cancel</button>' +
        '</div>';

      document.getElementById('lf-frequency').addEventListener('change', e => {
        document.getElementById('lf-custom-hours').style.display = e.target.value === 'custom' ? 'block' : 'none';
      });
      document.getElementById('lf-kind-seq').addEventListener('click', () => {
        syncChecklistFormState(); checklistFormState.parallel = false; renderChecklistForm();
      });
      document.getElementById('lf-kind-par').addEventListener('click', () => {
        syncChecklistFormState(); checklistFormState.parallel = true; renderChecklistForm();
      });
      document.getElementById('lf-save').addEventListener('click', saveChecklistForm);
      document.getElementById('lf-cancel').addEventListener('click', closeChecklistForm);
    }

    function saveChecklistForm() {
      const labelEl = document.getElementById('lf-label');
      const itemsEl = document.getElementById('lf-items');
      const freqEl = document.getElementById('lf-frequency');
      const customEl = document.getElementById('lf-custom-hours');
      const label = labelEl.value.trim();
      const itemLines = itemsEl.value.split('\n').map(s => s.trim()).filter(Boolean);
      if (!label) { labelEl.style.borderColor = '#ff6b6b'; labelEl.focus(); return; }
      if (!itemLines.length) { itemsEl.style.borderColor = '#ff6b6b'; itemsEl.focus(); return; }

      let frequencyHours = null;
      if (freqEl.value === 'custom') {
        const n = parseInt(customEl.value, 10);
        frequencyHours = n > 0 ? n : null;
      } else if (freqEl.value !== '') {
        frequencyHours = parseInt(freqEl.value, 10);
      }

      const checklists = getChecklists();
      if (checklistFormState.editingId) {
        const cl = checklists.find(c => c.id === checklistFormState.editingId);
        if (cl) { cl.label = label; cl.items = itemLines; cl.frequencyHours = frequencyHours; cl.parallel = checklistFormState.parallel; }
      } else {
        checklists.push({
          id: 'cl_' + Date.now().toString(36), label, items: itemLines,
          frequencyHours, parallel: checklistFormState.parallel, lastCompletedAt: null
        });
      }
      saveChecklists(checklists);
      checklistFormState = null;
      renderChecklistForm();
      renderLists();
      renderPick();
    }

    function deleteChecklist(id) {
      if (!confirm('Delete this list? This only removes the template — anything already added to your deliverables stays.')) return;
      saveChecklists(getChecklists().filter(c => c.id !== id));
      renderLists();
      renderPick();
    }

    function renderLists() {
      const host = document.getElementById('checklist-cards');
      if (!host) return;
      const checklists = getChecklists();
      if (!checklists.length) {
        host.innerHTML = '<div class="pick-empty">No lists yet — tap + New list to create one.</div>';
        return;
      }
      const delivText = getDeliverablesText();
      host.innerHTML = checklists.map(cl => {
        const pendingNow = isChecklistPendingInDeliverables(cl, delivText);
        const status = pendingNow ? 'In today’s plan' : (checklistDue(cl) ? 'Available to add' : 'Not due yet');
        return (
          '<div class="checklist-card">' +
            '<div class="checklist-card-label">' + escapeHtml(cl.label) + '</div>' +
            '<div class="checklist-card-meta">' + escapeHtml(describeFrequency(cl.frequencyHours)) + ' · ' + cl.items.length + ' item' + (cl.items.length === 1 ? '' : 's') + ' · ' + (cl.parallel ? 'any order' : 'one at a time') + '</div>' +
            '<div class="checklist-card-status">' + escapeHtml(status) + '</div>' +
            '<div class="deliv-menu">' +
              '<button type="button" class="deliv-menu-btn edit" data-edit-checklist="' + escapeHtml(cl.id) + '">✎ Edit</button>' +
              '<button type="button" class="deliv-menu-btn delete" data-delete-checklist="' + escapeHtml(cl.id) + '">✗ Delete</button>' +
            '</div>' +
          '</div>'
        );
      }).join('');
    }

    function getPicks() { return storage.get('todayPicks') || {}; }
    function savePicks(p) { storage.set('todayPicks', p); }
    function getMRU() { return storage.get('trayMRU') || []; }
    function saveMRU(m) { storage.set('trayMRU', m); }

    // Tap a badge to cycle off → 1 → 2 → 3 → off
    function cyclePriority(key) {
      const picks = getPicks();
      const cur = picks[key] || 0;
      if (cur >= 3) delete picks[key]; else picks[key] = cur + 1;
      savePicks(picks);
      renderPick(); renderToday();
    }

    function renderPick() {
      renderDelivList();   // keep the Deliverables list view in step with every data change
      const host = document.getElementById('pick-list');
      if (!host) return;
      const items = collapseSequentialNextAction(parseDeliverables(getDeliverablesText()).filter(it => !it.done));
      const picks = getPicks();
      const dueChecklists = dueChecklistOptions();
      host.innerHTML = '';
      if (items.length === 0 && dueChecklists.length === 0) {
        host.innerHTML = '<div class="pick-empty">Add deliverables first — one per line, steps indented with a leading dash.</div>';
        return;
      }
      dueChecklists.forEach(cl => {
        const row = document.createElement('div');
        row.className = 'pick-item due-checklist';
        const badge = document.createElement('div');
        badge.className = 'prio-badge';
        badge.title = 'Tap to add to today’s plan';
        badge.addEventListener('click', () => pickDueChecklist(cl));
        const txt = document.createElement('div');
        txt.className = 'ptext';
        txt.innerHTML = escapeHtml(cl.label) + ' <span class="due-tag">' + (cl.frequencyHours ? 'due' : 'list') + '</span>';
        row.appendChild(badge); row.appendChild(txt);
        host.appendChild(row);
      });
      items.forEach(it => {
        const row = document.createElement('div');
        row.className = 'pick-item' + (it.isStep ? ' step' : '');
        const pr = picks[it.key] || 0;
        const badge = document.createElement('div');
        badge.className = 'prio-badge' + (pr ? ' p' + pr : '');
        badge.textContent = pr || '';
        badge.title = 'Tap to set priority (1, 2, 3, off)';
        badge.addEventListener('click', () => cyclePriority(it.key));
        const txt = document.createElement('div');
        txt.className = 'ptext';
        txt.textContent = (it.isStep ? '↳ ' : '') + it.text;
        row.appendChild(badge); row.appendChild(txt);
        host.appendChild(row);
      });
    }

    function pickedItems() {
      const picks = getPicks();
      let items = parseDeliverables(getDeliverablesText())
        .filter(it => !it.done)
        .map((it, i) => ({ ...it, prio: picks[it.key], order: i }));
      items = collapseSequentialNextAction(items);

      // A picked deliverable automatically surfaces its steps too, even if they
      // weren't individually prioritized: every parallel step (order doesn't
      // matter, so all of them are actionable) plus the one sequential step
      // that's next (collapseSequentialNextAction already narrowed that to just
      // one). Inherits the parent's priority so it sorts and colors alongside it.
      const pickedParentPrio = {};
      items.forEach(it => { if (!it.isStep && it.prio) pickedParentPrio[it.text] = it.prio; });

      return items
        .filter(it => it.prio || (it.isStep && pickedParentPrio[it.parent]))
        .map(it => it.prio ? it : { ...it, prio: pickedParentPrio[it.parent], auto: true });
    }

    function renderToday() {
      const picked = pickedItems().sort((a, b) => (a.prio - b.prio) || (a.order - b.order));
      const html = picked.length === 0
        ? '<div class="today-empty">No items picked yet — use the Pick tab to set priorities.</div>'
        : picked.map(it => {
            const parent = it.isStep && it.parent ? `<span class="tparent">${escapeHtml(it.parent)} ▸ </span>` : '';
            return `<div class="today-row"><span class="today-dot p${it.prio}">${it.prio}</span><span class="t-txt" data-line="${it.lineIndex}" title="Log into the current time slot" onclick="addToCurrentSlot(${it.lineIndex})">${parent}${escapeHtml(it.text)}</span><button class="today-done" title="Mark done" onclick="markItemDone(${it.lineIndex})">✓</button></div>`;
          }).join('');
      ['today-summary', 'focus-today-summary'].forEach(id => {
        const el = document.getElementById(id); if (el) el.innerHTML = html;
      });
    }

    // Tap a Today item's name to log it into the current time slot, without
    // stealing focus or switching tabs — a quick "I'm doing this right now".
    function addToCurrentSlot(lineIndex) {
      const it = pickedItems().find(i => i.lineIndex === lineIndex);
      if (!it) return;
      const blockMin = currentBlockMinutes();
      const key = `block_${todayKey()}_${blockMin}`;
      const parts = (storage.get(key) || '').split(',').map(s => s.trim()).filter(Boolean);
      if (!parts.includes(it.text)) {
        parts.push(it.text);
        const newVal = parts.join(', ');
        storage.set(key, newVal);
        const input = document.getElementById(`block-input-${blockMin}`);
        if (input) input.value = newVal;
      }
      buzz();
      document.querySelectorAll(`.t-txt[data-line="${lineIndex}"]`).forEach(el => {
        el.classList.add('added-flash');
        setTimeout(() => el.classList.remove('added-flash'), 500);
      });
    }

    // Append " DONE" to a Deliverables line by index (hides it from Pick/Today).
    function markLineDoneByIndex(lineIndex) {
      const lines = getDeliverablesText().split('\n');
      if (lineIndex < 0 || lineIndex >= lines.length) return;
      if (!/\s+DONE$/.test(lines[lineIndex].trim())) {
        lines[lineIndex] = lines[lineIndex].replace(/\s+$/, '') + ' DONE';
      }
      const newText = lines.join('\n');
      storage.set('deliverables', newText);
      document.querySelectorAll('textarea.sync-notes[data-key="deliverables"]').forEach(el => el.value = newText);
    }

    // Mark a Today item done, then check whether that completes a checklist.
    function markItemDone(lineIndex) {
      markLineDoneByIndex(lineIndex);
      checkChecklistCompletion();
      renderPick(); renderToday();
    }

    // ---- Deliverables list view: tap a line for its action menu; Raw for bulk edits ----
    let delivSelected = -1;      // line index whose action menu is open
    let delivEditing = -1;       // line index being edited inline
    let delivEditWasNew = false; // editing a just-inserted line (abandon it if left empty)

    function writeDeliverablesLines(lines) {
      const newText = lines.join('\n');
      checkpointNotes('deliverables', getDeliverablesText(), newText);
      storage.set('deliverables', newText);
      document.querySelectorAll('textarea.sync-notes[data-key="deliverables"]').forEach(el => el.value = newText);
      renderPick(); renderToday();
      return newText;
    }

    function delivLines() {
      const t = getDeliverablesText();
      return t === '' ? [] : t.split('\n');
    }

    function delivClassify(line) {
      const t = line.trim();
      if (!t) return 'spacer';
      const done = /\s+DONE$/.test(t) || t[0] === '+';
      const task = t[0] === '-' || t[0] === '+';
      return (task ? 'task' : 'header') + (done ? ' done' : '');
    }

    function renderDelivList() {
      const host = document.getElementById('deliv-list');
      if (!host) return;
      if (host.querySelector('input')) return;   // never clobber an in-progress inline edit
      const lines = delivLines();
      host.innerHTML = '';
      if (!lines.length) {
        host.innerHTML = '<div class="pick-empty">Tap + Add to get started — one deliverable per line, its tasks as lines starting with a dash.</div>';
        return;
      }
      lines.forEach((line, idx) => {
        if (idx === delivEditing) { host.appendChild(buildDelivEditRow(line, idx)); return; }
        const cls = delivClassify(line);
        const row = document.createElement('div');
        row.className = 'deliv-row ' + cls + (idx === delivSelected ? ' selected' : '');
        if (cls === 'spacer') { host.appendChild(row); return; }
        row.textContent = line;
        row.addEventListener('click', () => {
          delivSelected = delivSelected === idx ? -1 : idx;
          renderDelivList();
        });
        host.appendChild(row);
        if (idx === delivSelected) host.appendChild(buildDelivMenu(line, idx));
      });
    }

    function buildDelivMenu(line, idx) {
      const menu = document.createElement('div');
      menu.className = 'deliv-menu';
      const t = line.trim();
      const isDone = /\s+DONE$/.test(t) || t[0] === '+';
      const btn = (cls, label, fn) => {
        const b = document.createElement('button');
        b.type = 'button'; b.className = 'deliv-menu-btn ' + cls; b.textContent = label;
        b.addEventListener('click', e => { e.stopPropagation(); fn(); });
        menu.appendChild(b);
      };
      if (isDone) btn('complete', '↺ Reopen', () => delivReopen(idx));
      else btn('complete', '✓ Done', () => delivComplete(idx, menu.getBoundingClientRect()));
      btn('edit', '✎ Edit', () => delivEditStart(idx));
      btn('newtask', '+ Task', () => delivInsertBelow(idx));
      btn('delete', '✗ Delete', () => delivDelete(idx, menu.getBoundingClientRect()));
      return menu;
    }

    function buildDelivEditRow(line, idx) {
      const wrap = document.createElement('div');
      wrap.className = 'deliv-edit-row';
      const input = document.createElement('input');
      input.type = 'text';
      input.value = line;
      let committed = false;
      const commit = (cancel, chain) => {
        if (committed) return; committed = true;
        const lines = delivLines();
        const val = input.value;
        const wasNew = delivEditWasNew;
        const emptyVal = !val.replace(/^[-+]\s*/, '').trim();
        delivEditing = -1; delivEditWasNew = false; delivSelected = -1;
        wrap.remove();
        if (cancel || (wasNew && emptyVal)) {
          if (wasNew) { lines.splice(idx, 1); writeDeliverablesLines(lines); }
          renderDelivList();
          return;
        }
        lines[idx] = val;
        // Enter on a task line chains straight into another new task below it
        const chainTask = chain && val.trim()[0] === '-';
        if (chainTask) { lines.splice(idx + 1, 0, '- '); delivEditing = idx + 1; delivEditWasNew = true; }
        writeDeliverablesLines(lines);
        renderDelivList();
        if (chainTask) focusDelivInput(true);
      };
      // Commit this line, then hop straight into editing the line above/below
      const nav = (delta) => {
        if (committed) return; committed = true;
        const lines = delivLines();
        const val = input.value;
        const wasNew = delivEditWasNew;
        const emptyVal = !val.replace(/^[-+]\s*/, '').trim();
        wrap.remove();
        let target;
        if (wasNew && emptyVal) {                    // abandon the empty new line
          lines.splice(idx, 1);
          target = delta > 0 ? idx : idx - 1;        // indices after the removal
        } else {
          lines[idx] = val;
          target = idx + delta;
        }
        delivSelected = -1; delivEditWasNew = false;
        if (!lines.length) {
          delivEditing = -1;
          writeDeliverablesLines(lines);
          renderDelivList();
          return;
        }
        delivEditing = Math.min(Math.max(target, 0), lines.length - 1);
        writeDeliverablesLines(lines);
        renderDelivList();
        focusDelivInput(false);
      };
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); commit(false, true); }
        else if (e.key === 'Escape') commit(true, false);
        else if (e.key === 'ArrowUp') { e.preventDefault(); nav(-1); }
        else if (e.key === 'ArrowDown') { e.preventDefault(); nav(1); }
      });
      input.addEventListener('blur', () => setTimeout(() => commit(false, false), 100));
      wrap.appendChild(input);
      // On-screen ↑/↓ for phones (no arrow keys there); pointerdown-preventDefault
      // keeps the input focused so the blur-commit doesn't fire first
      [['↑', -1], ['↓', 1]].forEach(([label, delta]) => {
        const b = document.createElement('button');
        b.type = 'button'; b.className = 'deliv-nav-btn'; b.textContent = label;
        b.addEventListener('pointerdown', e => e.preventDefault());
        b.addEventListener('mousedown', e => e.preventDefault());
        b.addEventListener('click', e => { e.stopPropagation(); nav(delta); });
        wrap.appendChild(b);
      });
      return wrap;
    }

    function focusDelivInput(isNew) {
      const input = document.querySelector('#deliv-list .deliv-edit-row input');
      if (!input) return;
      input.focus();
      if (isNew) { const n = input.value.length; input.setSelectionRange(n, n); }
      else input.select();
    }

    function delivEditStart(idx) {
      delivSelected = -1; delivEditing = idx; delivEditWasNew = false;
      renderDelivList();
      focusDelivInput(false);
    }

    function delivComplete(idx, rect) {
      const lines = delivLines();
      if (idx < 0 || idx >= lines.length) return;
      const t = lines[idx].trim();
      if (t[0] === '-') lines[idx] = lines[idx].replace(/^(\s*)-/, '$1+');
      else if (!/\s+DONE$/.test(t)) lines[idx] = lines[idx].replace(/\s*$/, '') + ' DONE';
      delivSelected = -1;
      writeDeliverablesLines(lines);
      checkChecklistCompletion();
      renderDelivList();
      celebrate(rect); buzz();
    }

    function delivReopen(idx) {
      const lines = delivLines();
      if (idx < 0 || idx >= lines.length) return;
      lines[idx] = lines[idx].replace(/\s+DONE$/, '').replace(/^(\s*)\+/, '$1-');
      delivSelected = -1;
      writeDeliverablesLines(lines);
      renderDelivList();
    }

    function delivInsertBelow(idx) {
      const lines = delivLines();
      if (idx < 0 || idx >= lines.length) return;
      lines.splice(idx + 1, 0, '- ');
      delivSelected = -1; delivEditing = idx + 1; delivEditWasNew = true;
      writeDeliverablesLines(lines);
      renderDelivList();
      focusDelivInput(true);
    }

    function delivDelete(idx, rect) {
      const lines = delivLines();
      if (idx < 0 || idx >= lines.length) return;
      lines.splice(idx, 1);
      delivSelected = -1;
      celebrate(rect); buzz();
      writeDeliverablesLines(lines);
      renderDelivList();
    }

    function delivAppend() {
      const ta = document.getElementById('deliverables-notes');
      if (ta && ta.style.display !== 'none') toggleDelivRaw(false);
      const lines = delivLines();
      lines.push('');
      delivSelected = -1; delivEditing = lines.length - 1; delivEditWasNew = true;
      writeDeliverablesLines(lines);
      renderDelivList();
      focusDelivInput(true);
    }

    function toggleDelivRaw(force) {
      const ta = document.getElementById('deliverables-notes');
      const list = document.getElementById('deliv-list');
      const btn = document.getElementById('deliv-raw-btn');
