      if (!ta || !list) return;
      const showRaw = force !== undefined ? force : ta.style.display === 'none';
      ta.style.display = showRaw ? '' : 'none';
      list.style.display = showRaw ? 'none' : '';
      if (btn) btn.classList.toggle('active', showRaw);
      if (!showRaw) { delivSelected = -1; delivEditing = -1; renderDelivList(); }
    }

    function buzz(ms = 25) { try { navigator.vibrate?.(ms); } catch (e) {} }

    // Small celebratory burst, anchored to the tapped menu when possible
    function celebrate(rect) {
      const host = document.createElement('div');
      host.className = 'celebrate-burst';
      if (rect && rect.width) {
        host.style.left = (rect.left + rect.width / 2) + 'px';
        host.style.top = rect.top + 'px';
        host.style.bottom = 'auto';
      }
      const emojis = ['✨', '🎉', '⭐'];
      for (let i = 0; i < 12; i++) {
        const p = document.createElement('span');
        p.className = 'celebrate-particle';
        p.textContent = emojis[i % emojis.length];
        const angle = (Math.PI * 2 * i) / 12 + (Math.random() * 0.4 - 0.2);
        const dist = 60 + Math.random() * 50;
        p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--dy', (Math.sin(angle) * dist - 30) + 'px');
        p.style.animationDelay = Math.round(Math.random() * 60) + 'ms';
        host.appendChild(p);
      }
      document.body.appendChild(host);
      setTimeout(() => host.remove(), 900);
    }

    // Tray order: most-recently-used first, then remaining picks by priority.
    function trayItems() {
      const picked = pickedItems();
      const mru = getMRU();
      return picked.sort((a, b) => {
        const ia = mru.indexOf(a.key), ib = mru.indexOf(b.key);
        if (ia !== -1 || ib !== -1) {
          if (ia === -1) return 1;
          if (ib === -1) return -1;
          return ia - ib;
        }
        return (a.prio - b.prio) || (a.order - b.order);
      });
    }

    // Most recent non-empty slot logged before this block (for the "same" chip)
    function lastSlotInput(beforeMinutes) {
      const today = todayKey();
      let best = null;
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        const m = k && k.match(/^block_(.+)_(\d+)$/);
        if (!m || m[1] !== today) continue;
        const mins = parseInt(m[2]);
        if (mins >= beforeMinutes) continue;
        const v = storage.get(k);
        if (v && String(v).trim() && (best === null || mins > best.mins)) best = { mins, text: String(v).trim() };
      }
      return best ? best.text : null;
    }

    function showTray(input) {
      const block = input.closest('.time-block');
      if (!block) return;
      block.querySelectorAll('.tray').forEach(t => t.remove());
      const items = trayItems();
      const blockMin = parseInt((input.id || '').replace('block-input-', '')) || 0;
      const last = lastSlotInput(blockMin);

      const tray = document.createElement('div');
      tray.className = 'tray';

      const appendText = (text, key) => {
        const cur = input.value.trim();
        input.value = cur ? cur + ', ' + text : text;
        input.dispatchEvent(new Event('input'));
        if (key) { const mru = getMRU().filter(k => k !== key); mru.unshift(key); saveMRU(mru); }
        input.focus();
        showTray(input);
      };

      // "Same as last slot" first — unless that text is already a today-item chip
      if (last && !items.some(it => it.text === last)) {
        const chip = document.createElement('span');
        chip.className = 'tray-chip same';
        chip.title = 'Same as last: ' + last;
        chip.innerHTML = '↻ ' + escapeHtml(last.length > 20 ? last.slice(0, 19) + '…' : last);
        chip.addEventListener('mousedown', e => e.preventDefault());
        chip.addEventListener('click', () => appendText(last, null));
        tray.appendChild(chip);
      }

      items.forEach(it => {
        const chip = document.createElement('span');
        chip.className = 'tray-chip';
        chip.title = it.text;
        const label = it.text.length > 22 ? it.text.slice(0, 21) + '…' : it.text;
        chip.innerHTML = `<span class="tc-dot p${it.prio}"></span>${escapeHtml(label)}`;
        chip.addEventListener('mousedown', e => e.preventDefault()); // keep input focused
        chip.addEventListener('click', () => appendText(it.text, it.key));
        tray.appendChild(chip);
      });

      if (tray.children.length) block.appendChild(tray);
    }

    function currentBlockMinutes() {
      const now = new Date();
      const interval = getInterval();
      return Math.floor((now.getHours() * 60 + now.getMinutes()) / interval) * interval;
    }

    let lastTrackedBlock = currentBlockMinutes();

    function autoTrack() {
      const block = currentBlockMinutes();
      const blockChanged = block !== lastTrackedBlock;
      lastTrackedBlock = block;

      if (document.getElementById('panel-focus').style.display === 'none') return;

      if (blockChanged) {
        // Only snap the window if the new current block has moved outside what's visible
        const visible = block >= windowStartMinutes && block < windowStartMinutes + 60;
        if (!visible) windowStartMinutes = getCurrentWindowStart();
        buildFocusTimeline();
      }
    }

    function switchTab(n) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab')[n].classList.add('active');
      document.getElementById('panel-plan').style.display = n === 0 ? 'block' : 'none';
      document.getElementById('panel-focus').style.display = n === 1 ? 'block' : 'none';
      document.getElementById('panel-settings').style.display = n === 2 ? 'block' : 'none';
      if (n === 1) { windowStartMinutes = getCurrentWindowStart(); buildFocusTimeline(); renderToday(); }
      if (n === 2) renderRecoverList();
    }

    function addWheelListener() {
      const timeline = document.getElementById('focus-timeline');
      timeline.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 60 : -60;
        windowStartMinutes = Math.max(startHour * 60, Math.min((endHour - 1) * 60, windowStartMinutes + delta));
        buildFocusTimeline();
      });
    }

    function buildMiniCalendar() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      document.getElementById('calendar-header').textContent = now.toLocaleString('default', { month: 'long', year: 'numeric' });

      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';

      const days = ['S','M','T','W','T','F','S'];
      days.forEach(d => {
        const el = document.createElement('div');
        el.className = 'header';
        el.textContent = d;
        grid.appendChild(el);
      });

      for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

      for (let day = 1; day <= daysInMonth; day++) {
        const el = document.createElement('div');
        el.textContent = day;
        if (day === now.getDate()) el.classList.add('today');
        grid.appendChild(el);
      }
    }

    function updateAnalogClock() {
      const now = new Date();
      const seconds = now.getSeconds();
      const minutes = now.getMinutes();
      const hours = now.getHours();

      const secondDeg = seconds * 6;
      const minuteDeg = minutes * 6 + seconds * 0.1;
      const hourDeg = (hours % 12) * 30 + minutes * 0.5;

      document.getElementById('second-hand').setAttribute('transform', `rotate(${secondDeg} 70 70)`);
      document.getElementById('minute-hand').setAttribute('transform', `rotate(${minuteDeg} 70 70)`);
      document.getElementById('hour-hand').setAttribute('transform', `rotate(${hourDeg} 70 70)`);
    }

    function initClockMarks() {
      const marksGroup = document.getElementById('clock-marks');
      for (let i = 0; i < 12; i++) {
        const angle = i * 30;
        const x1 = 70 + 52 * Math.cos((angle - 90) * Math.PI / 180);
        const y1 = 70 + 52 * Math.sin((angle - 90) * Math.PI / 180);
        const x2 = 70 + 58 * Math.cos((angle - 90) * Math.PI / 180);
        const y2 = 70 + 58 * Math.sin((angle - 90) * Math.PI / 180);
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", x1); line.setAttribute("y1", y1);
        line.setAttribute("x2", x2); line.setAttribute("y2", y2);
        line.setAttribute("stroke", "#555"); line.setAttribute("stroke-width", "3");
        marksGroup.appendChild(line);
      }
    }

    function exportData() {
      const today = todayKey();
      const blockLogs = {};
      const hourGoals = {};
      for (let h = startHour; h < endHour; h++) {
        const goal = storage.get(`hourGoal_${today}_${h * 60}`);
        if (goal) hourGoals[formatAMPM(h * 60)] = goal;
        for (let m = 0; m < 60; m += getInterval()) {
          const mins = h * 60 + m;
          const val = storage.get(`block_${today}_${mins}`);
          if (val) blockLogs[formatAMPM(mins)] = val;
        }
      }
      const data = {
        date: today,
        appointments,
        hourGoals,
        blockLogs,
        notes: document.getElementById('daily-notes').value,
        deliverables: storage.get('deliverables') || '',
        todayPicks: getPicks()
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `focus-flow-${today}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function testSpeech() {
      speak(`The time is ${formatAMPM(new Date().getHours() * 60 + new Date().getMinutes())}`);
    }

    function testTenMin() {
      if (document.getElementById('tenmin-mode').value === "tone") playTone();
    }

    function getVolume() {
      return (parseInt(document.getElementById('volume-slider')?.value ?? 50) / 100);
    }

    // One shared AudioContext, reused for every beep. Creating a new one each
    // time leaks contexts and silently stops working after the browser's limit.
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch (e) { return null; }
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    // Unlock/resume audio on the first user gesture (required by iOS/Safari)
    ['click','touchend','keydown'].forEach(evt =>
      document.addEventListener(evt, () => getAudioCtx(), { once: true, passive: true }));

    function playTone() {
      if (muted) return;
      const vol = getVolume();
      if (vol === 0) return;
      const ctx = getAudioCtx();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 680;
      gain.gain.value = vol * 0.6;
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      osc.start();
      osc.stop(ctx.currentTime + 0.8);
    }

    function speak(text) {
      if (muted) return;
      const vol = getVolume();
      if (vol === 0) return;
      const u = new SpeechSynthesisUtterance(text);
      u.pitch = 1.1;
      u.rate = 0.95;
      u.volume = vol;
      speechSynthesis.speak(u);
    }

    // True when the current time is inside any planned appointment window
    function inAppointment() {
      const mins = new Date().getHours() * 60 + new Date().getMinutes();
      return appointments.some(a => mins >= a.startMinutes && mins < a.endMinutes);
    }

    let lastNotifiedMinute = -1;
    function checkNotifications() {
      if (muted) return;
      if (document.getElementById('auto-mute')?.checked && inAppointment()) return;
      const now = new Date();
      const mins = now.getHours() * 60 + now.getMinutes();
      if (mins === lastNotifiedMinute) return;
      lastNotifiedMinute = mins;

      const m = now.getMinutes();

      // Speech feedback — hourly, every 30m, or none
      const speechMode = document.getElementById('speech-mode')?.value || 'none';
      let spoke = false;
      if ((speechMode === 'hourly' && m === 0) || (speechMode === '30' && (m === 0 || m === 30))) {
        speak(`The time is ${formatAMPM(mins)}`);
        spoke = true;
      }

      // Interval tone feedback — skipped on minutes where speech just fired
      if (!spoke) {
        const interval = parseInt(document.getElementById('tenmin-interval')?.value ?? 10);
        if (m % interval === 0 && document.getElementById('tenmin-mode')?.value === 'tone') playTone();
      }
    }

    function toggleMute() {
      muted = !muted;
      document.getElementById('mute-btn').textContent = muted ? '🔊 Unmute' : '🔇 Mute All';
    }

    function resetDay() {
      if (!confirm('Clear all block notes, hour goals, and daily notes for today? Appointments are kept.')) return;
      const today = todayKey();
      for (let h = 0; h < 24; h++) {
        localStorage.removeItem(`hourGoal_${today}_${h * 60}`);
        localStorage.removeItem(`hourCheck_${today}_${h * 60}`);
        for (let m = 0; m < 60; m += 10) {
          localStorage.removeItem(`block_${today}_${h * 60 + m}`);
        }
      }
      storage.set('dailyNotes', '');
      document.querySelectorAll('textarea.sync-notes[data-key="dailyNotes"]').forEach(el => el.value = '');
      if (document.getElementById('panel-focus').style.display !== 'none') buildFocusTimeline();
    }

    function initHourSettings() {
      const startSel = document.getElementById('setting-start-hour');
      const endSel   = document.getElementById('setting-end-hour');
      for (let h = 0; h <= 23; h++) {
        const label = formatAMPM(h * 60);
        startSel.innerHTML += `<option value="${h}"${h === startHour ? ' selected' : ''}>${label}</option>`;
        endSel.innerHTML   += `<option value="${h}"${h === endHour   ? ' selected' : ''}>${label}</option>`;
      }
      startSel.addEventListener('change', () => {
        startHour = parseInt(startSel.value);
        storage.set('startHour', startHour);
        windowStartMinutes = getCurrentWindowStart();
        renderTimePicker();
        if (document.getElementById('panel-focus').style.display !== 'none') buildFocusTimeline();
      });
      endSel.addEventListener('change', () => {
        endHour = parseInt(endSel.value);
        storage.set('endHour', endHour);
        renderTimePicker();
        if (document.getElementById('panel-focus').style.display !== 'none') buildFocusTimeline();
      });
    }

    let muted = false;

    // Interval selector persist
    (function() {
      const sel = document.getElementById('tenmin-interval');
      const saved = storage.get('tenminInterval');
      if (saved) sel.value = saved;
      sel.addEventListener('change', () => {
        storage.set('tenminInterval', sel.value);
        if (document.getElementById('panel-focus').style.display !== 'none') buildFocusTimeline();
      });
    })();

    // Volume slider init
    (function() {
      const slider = document.getElementById('volume-slider');
      const label  = document.getElementById('volume-label');
      const saved  = storage.get('volume');
      if (saved !== null) slider.value = saved;
      label.textContent = slider.value + '%';
      slider.addEventListener('input', () => {
        label.textContent = slider.value + '%';
        storage.set('volume', slider.value);
      });
    })();

    // Auto-mute checkbox — persist its state
    (function() {
      const cb = document.getElementById('auto-mute');
      const saved = storage.get('autoMute');
      if (saved !== null) cb.checked = saved;
      cb.addEventListener('change', () => storage.set('autoMute', cb.checked));
    })();

    // Persist feedback mode selects
    ['speech-mode', 'tenmin-mode'].forEach(id => {
      const sel = document.getElementById(id);
      if (!sel) return;
      const saved = storage.get(id);
      if (saved !== null) sel.value = saved;
      sel.addEventListener('change', () => storage.set(id, sel.value));
    });

    // Calendar import settings — persist + optional auto-pull on open
    (function() {
      const url = document.getElementById('ics-url');
      const proxy = document.getElementById('ics-proxy');
      const auto = document.getElementById('ics-auto');
      if (url) { url.value = storage.get('icsUrl') || ''; url.addEventListener('change', () => storage.set('icsUrl', url.value.trim())); }
      if (proxy) { proxy.value = storage.get('icsProxy') || ''; proxy.addEventListener('change', () => storage.set('icsProxy', proxy.value.trim())); }
      if (auto) {
        const a = storage.get('icsAuto'); if (a !== null) auto.checked = a;
        auto.addEventListener('change', () => storage.set('icsAuto', auto.checked));
        if (auto.checked && (storage.get('icsUrl') || '')) setTimeout(() => pullCalendar(), 1500);
      }
    })();

    // Service Worker (PWA)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    // Auto-select text on focus
    document.addEventListener('focusin', e => {
      if (e.target.tagName === 'INPUT' && e.target.type === 'text') e.target.select();
    });

    // Init
    renderPlanList();
    renderTimePicker();
    buildMiniCalendar();
    initClockMarks();
    initHourSettings();
    setInterval(updateAnalogClock, 1000);
    updateAnalogClock();
    addWheelListener();

    setInterval(autoTrack, 10000);
    setInterval(checkNotifications, 15000);
    checkNotifications();

    // Synced notes — all textareas sharing a data-key stay in sync
    function initSyncedNotes() {
      document.querySelectorAll('textarea.sync-notes').forEach(el => {
        el.value = storage.get(el.dataset.key) || '';
        el.addEventListener('input', () => {
          const key = el.dataset.key;
          if (NOTES_HISTORY_KEYS.includes(key)) checkpointNotes(key, storage.get(key) || '', el.value);
          storage.set(key, el.value);
          document.querySelectorAll(`textarea.sync-notes[data-key="${key}"]`).forEach(other => {
            if (other !== el) other.value = el.value;
          });
        });
      });
    }

    // ---- Recover Notes panel (Settings) ----
    function renderRecoverList() {
      const sel = document.getElementById('recover-key');
      const host = document.getElementById('recover-list');
      if (!sel || !host) return;
      const key = sel.value;
      const hist = getNotesHistory(key);
      if (!hist.length) { host.innerHTML = '<div style="color:#555;font-size:0.85rem;">No snapshots yet — they build up as you edit.</div>'; return; }
      host.innerHTML = '';
      hist.forEach(entry => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:6px;background:#1a2030;border:1px solid #2a3555;border-radius:8px;padding:8px;';
        const info = document.createElement('div');
        info.style.cssText = 'flex:1;min-width:0;';
        const time = document.createElement('div');
        time.style.cssText = 'color:#8ab4f8;font-size:0.78rem;';
        time.textContent = new Date(entry.ts).toLocaleString();
        const preview = document.createElement('div');
        preview.style.cssText = 'color:#888;font-size:0.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
        preview.textContent = entry.value.slice(0, 80).replace(/\n/g, ' ↵ ') || '(empty)';
        info.appendChild(time); info.appendChild(preview);
        const btn = document.createElement('button');
        btn.textContent = 'Restore';
        btn.style.cssText = 'background:#252b3d;color:#ddd;border:1px solid #333;border-radius:6px;padding:6px 10px;cursor:pointer;flex-shrink:0;';
        btn.addEventListener('click', () => {
          if (!confirm('Restore this version? The current text will be saved as a snapshot first.')) return;
          pushNotesHistory(key, storage.get(key) || '');
          storage.set(key, entry.value);
          document.querySelectorAll(`textarea.sync-notes[data-key="${key}"]`).forEach(t => t.value = entry.value);
          if (key === 'deliverables') { renderPick(); renderToday(); }
          renderRecoverList();
        });
        row.appendChild(info); row.appendChild(btn);
        host.appendChild(row);
      });
    }
    document.getElementById('recover-key')?.addEventListener('change', renderRecoverList);

    // Sub-tab switching — each .notes-tabs group toggles its own data-target panels
    document.querySelectorAll('.notes-tabs').forEach(group => {
      const tabs = [...group.querySelectorAll('.notes-tab')];
      const targets = tabs.map(t => t.dataset.target);
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          targets.forEach(id => {
            const p = document.getElementById(id);
            if (p) p.style.display = id === tab.dataset.target ? '' : 'none';
          });
          if (tab.dataset.target === 'plan-pick') renderPick();
          if (tab.dataset.target === 'plan-lists') { closeChecklistForm(); renderLists(); }
          if (tab.dataset.target === 'plan-today' || tab.dataset.target === 'focus-today') renderToday();
        });
      });
    });

    document.getElementById('btn-new-checklist').addEventListener('click', openNewChecklistForm);
    document.getElementById('checklist-cards').addEventListener('click', e => {
      const editBtn = e.target.closest('[data-edit-checklist]');
      if (editBtn) { openEditChecklistForm(editBtn.getAttribute('data-edit-checklist')); return; }
      const delBtn = e.target.closest('[data-delete-checklist]');
      if (delBtn) { deleteChecklist(delBtn.getAttribute('data-delete-checklist')); }
    });

    // Re-render pick/today views live as deliverables text changes
    document.querySelectorAll('textarea.sync-notes[data-key="deliverables"]').forEach(el => {
      el.addEventListener('input', () => { renderPick(); renderToday(); });
    });

initSyncedNotes();
renderPick();
renderToday();
renderLists();
setInterval(renderPick, 60000);   // catch a checklist becoming due while Pick sits open
  </script>
</body>
</html>
