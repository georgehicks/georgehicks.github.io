<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#14171C" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Span — Working Memory &amp; Mental Math</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<style>
  :root {
    --bg: #14171C; --surface: #1B1F26; --surface-2: #232832; --border: #2E3440;
    --ink: #ECE8DF; --ink-muted: #9AA0AC; --ink-faint: #5B6270;
    --brass: #CD9A4E; --brass-strong: #E4B268; --teal: #5FA98C; --rust: #C1614A;
    --font-display: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#F5F1E8; --surface:#FFFFFF; --surface-2:#EDE7D8; --border:#DDD5C0;
      --ink:#201C15; --ink-muted:#6B6455; --ink-faint:#A79E8A;
      --brass:#A9782F; --brass-strong:#8C6224; --teal:#3F8367; --rust:#A8432C; }
  }
  :root[data-theme="dark"] { --bg:#14171C; --surface:#1B1F26; --surface-2:#232832; --border:#2E3440;
    --ink:#ECE8DF; --ink-muted:#9AA0AC; --ink-faint:#5B6270;
    --brass:#CD9A4E; --brass-strong:#E4B268; --teal:#5FA98C; --rust:#C1614A; }
  :root[data-theme="light"] { --bg:#F5F1E8; --surface:#FFFFFF; --surface-2:#EDE7D8; --border:#DDD5C0;
    --ink:#201C15; --ink-muted:#6B6455; --ink-faint:#A79E8A;
    --brass:#A9782F; --brass-strong:#8C6224; --teal:#3F8367; --rust:#A8432C; }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink); font-family: var(--font-body);
    line-height: 1.5; font-size: 16px; -webkit-tap-highlight-color: transparent;
  }
  button, input { font-family: inherit; }
  button { cursor: pointer; }
  :focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }

  .page { min-height: 100vh; padding: calc(1.25rem + env(safe-area-inset-top, 0px)) 1.1rem calc(3rem + env(safe-area-inset-bottom, 0px)); }
  .wrap { max-width: 28rem; margin: 0 auto; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.6rem; min-height: 2rem; }
  .wordmark { font-family: var(--font-display); font-size: 1.3rem; }
  .topbar-right { display: flex; align-items: center; gap: 0.9rem; }
  .streak-badge { font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink-muted); }
  .streak-badge b { color: var(--brass-strong); font-variant-numeric: tabular-nums; }
  .link-btn {
    background: none; border: none; color: var(--ink-muted); font-size: 0.85rem;
    padding: 0.3rem 0.1rem; border-bottom: 1px solid transparent;
  }
  .link-btn:hover { color: var(--ink); border-color: var(--border); }
  .icon-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    width: 2rem; height: 2rem; display: flex; align-items: center; justify-content: center;
    color: var(--ink-muted); font-size: 0.95rem;
  }
  .exit-link { display: none; color: var(--rust); }
  .topbar.in-session .topbar-right { display: none; }
  .topbar:not(.in-session) .exit-link { display: none; }
  .topbar.in-session .exit-link { display: inline-block; }

  .view { display: none; }
  .view.active { display: block; }

  /* ---- home ---- */
  .greet-sub { font-size: 0.85rem; color: var(--ink-muted); margin: 0 0 0.15rem; }
  .greet { font-family: var(--font-display); font-weight: 400; font-size: 1.7rem; margin: 0 0 1.3rem; text-wrap: balance; }

  .cta {
    width: 100%; border: none; text-align: left;
    background: linear-gradient(160deg, var(--brass-strong), var(--brass));
    color: #1B1305; border-radius: 16px; padding: 1.1rem 1.2rem;
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.6rem;
  }
  .cta-title { font-weight: 700; font-size: 1.02rem; }
  .cta-meta { font-family: var(--font-mono); font-size: 0.7rem; opacity: 0.75; margin-top: 0.2rem; letter-spacing: 0.03em; }
  .cta-arrow { font-size: 1.3rem; }

  .section-label {
    font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-faint); margin: 1.5rem 0 0.7rem;
  }

  .meters { display: flex; justify-content: space-around; margin-bottom: 1.5rem; }
  .meter { position: relative; width: 84px; height: 84px; display: flex; align-items: center; justify-content: center; }
  .meter::before {
    content: ""; position: absolute; inset: -8px; border-radius: 50%;
    background: repeating-conic-gradient(var(--ink-faint) 0deg 1.6deg, transparent 1.6deg 15deg);
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #000 calc(100% - 7px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #000 calc(100% - 7px));
    opacity: 0.5;
  }
  .meter svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .meter circle { fill: none; stroke-width: 7; }
  .meter .track { stroke: var(--border); }
  .meter .value {
    stroke: var(--brass); stroke-linecap: round; stroke-dasharray: 327;
    stroke-dashoffset: calc(327 - (327 * var(--pct)) / 100);
    transition: stroke-dashoffset 0.9s cubic-bezier(.2,.7,.3,1);
  }
  .meter-num { position: absolute; font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 1.05rem; font-weight: 600; }
  .meter-num small { font-size: 0.62rem; color: var(--ink-muted); }
  .meter-label { position: absolute; bottom: -1.2rem; left: 50%; transform: translateX(-50%); font-size: 0.62rem; color: var(--ink-muted); white-space: nowrap; }

  .queue-chip {
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 14px;
    padding: 0.85rem 1rem; display: flex; align-items: center; justify-content: space-between;
  }
  .qc-left { display: flex; align-items: center; gap: 0.6rem; }
  .qc-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--rust); flex-shrink: 0; }
  .qc-text { font-size: 0.85rem; }
  .qc-count { font-family: var(--font-mono); font-size: 0.82rem; color: var(--ink-muted); }

  .history-strip, .week-strip { display: flex; gap: 4px; }
  .history-strip i, .week-strip i {
    flex: 1; height: 22px; border-radius: 4px; background: var(--surface-2);
    display: block; border: 1px solid var(--border);
  }

  /* ---- session ---- */
  .exercise-track { display: flex; gap: 5px; margin: 0 0 1.6rem; }
  .exercise-track span { flex: 1; height: 4px; border-radius: 2px; background: var(--border); }
  .exercise-track span.done { background: var(--teal); }
  .exercise-track span.now { background: var(--brass); }

  .session-stage { display: flex; flex-direction: column; align-items: center; text-align: center; min-height: 22rem; padding-top: 1rem; }
  .stage-instruction { font-size: 0.9rem; color: var(--ink-muted); margin: 0 0 1.3rem; }
  .equation-big {
    font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-weight: 600;
    font-size: clamp(1.9rem, 1.5rem + 2vw, 2.6rem); margin-bottom: 1.8rem; letter-spacing: -0.01em;
  }
  .answer-input {
    width: 12rem; max-width: 80%; text-align: center; font-family: var(--font-mono);
    font-size: 1.6rem; font-variant-numeric: tabular-nums; padding: 0.6rem 0.5rem;
    border-radius: 12px; border: 1px solid var(--border); background: var(--surface-2); color: var(--ink);
    margin-bottom: 1rem;
  }
  .answer-input.letters { letter-spacing: 0.3em; }
  .answer-input:focus { border-color: var(--brass); }
  .check-btn, .cta-btn, .continue-btn {
    font-family: var(--font-body); font-weight: 600; font-size: 0.92rem;
    background: var(--brass); color: #1B1305; border: none; border-radius: 12px;
    padding: 0.7rem 1.6rem;
  }
  .continue-btn { margin-top: 0.9rem; }
  .feedback { margin-top: 1.3rem; min-height: 2.5rem; }
  .fb-ok { color: var(--teal); font-weight: 600; }
  .fb-bad { color: var(--rust); font-weight: 600; }
  .hint { color: var(--ink-muted); font-size: 0.88rem; max-width: 22rem; margin: 0.6rem auto 0; }

  .tf-row { display: flex; gap: 0.8rem; margin-bottom: 2rem; }
  .tf-btn { padding: 0.65rem 1.5rem; border-radius: 11px; font-weight: 700; font-size: 0.9rem; border: 1px solid var(--border); background: var(--surface); color: var(--ink); }
  .tf-btn.true { border-color: var(--teal); color: var(--teal); }
  .tf-btn.false { border-color: var(--rust); color: var(--rust); }
  .tf-btn:disabled { opacity: 0.5; }

  .ds-display {
    font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-weight: 700;
    font-size: 3.4rem; height: 4.5rem; display: flex; align-items: center; justify-content: center;
    color: var(--brass-strong); transition: opacity 0.15s;
  }
  .ds-display.pulse { animation: dspulse 0.5s ease; }
  @keyframes dspulse { from { transform: scale(1.15); } to { transform: scale(1); } }

  .summary { padding-top: 2rem; }
  .summary-big { font-family: var(--font-mono); font-size: 3.4rem; font-weight: 700; color: var(--brass-strong); margin-bottom: 0.4rem; }
  .summary-sub { color: var(--ink-muted); font-size: 0.9rem; margin-bottom: 2rem; }

  /* ---- progress ---- */
  .spark-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 14px; padding: 0.9rem 1rem 0.75rem; margin-bottom: 0.85rem; }
  .spark-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.35rem; }
  .spark-title { font-size: 0.8rem; color: var(--ink-muted); }
  .spark-val { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 1rem; font-weight: 700; }
  .spark-card svg { width: 100%; height: 46px; display: block; }

  .mastery-row { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.6rem; }
  .mastery-label { font-size: 0.78rem; color: var(--ink-muted); width: 9.5rem; flex-shrink: 0; }
  .mastery-track { flex: 1; height: 6px; border-radius: 3px; background: var(--surface-2); position: relative; overflow: hidden; }
  .mastery-fill { position: absolute; inset: 0; width: var(--w); background: linear-gradient(90deg, var(--brass), var(--brass-strong)); border-radius: 3px; }
  .mastery-pct { font-family: var(--font-mono); font-size: 0.74rem; color: var(--ink-muted); width: 2.4rem; text-align: right; flex-shrink: 0; }

  .review-item {
    display: inline-block; font-family: var(--font-mono); font-size: 0.82rem;
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.35rem 0.6rem; margin: 0 0.4rem 0.4rem 0;
  }
  .empty-note { color: var(--ink-muted); font-size: 0.85rem; }

  @media (prefers-reduced-motion: reduce) {
    .meter .value { transition: none; }
    .ds-display.pulse { animation: none; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="wrap">

    <div class="topbar" id="topbar">
      <div class="wordmark">Span</div>
      <div class="topbar-right">
        <span class="streak-badge" id="streak-badge"></span>
        <button class="link-btn" id="progress-link" type="button">Progress</button>
        <button class="icon-btn" id="theme-toggle" type="button" aria-label="Toggle theme">◐</button>
      </div>
      <button class="link-btn exit-link" id="exit-session-btn" type="button">Exit</button>
    </div>

    <div class="view active" data-view="home">
      <p class="greet-sub" id="home-date"></p>
      <h1 class="greet" id="greet-name"></h1>

      <button class="cta" id="start-session-btn" type="button">
        <div>
          <div class="cta-title">Start today's session</div>
          <div class="cta-meta" id="cta-meta"></div>
        </div>
        <div class="cta-arrow">→</div>
      </button>

      <div class="section-label" style="margin-top:0">Skill meters</div>
      <div class="meters" id="home-meters"></div>

      <div class="queue-chip" id="review-chip">
        <div class="qc-left"><span class="qc-dot"></span><span class="qc-text">Due for review</span></div>
        <span class="qc-count" id="review-count"></span>
      </div>

      <div class="section-label">Last 14 days</div>
      <div class="history-strip" id="home-history-strip"></div>
    </div>

    <div class="view" data-view="session">
      <div class="exercise-track" id="exercise-track"></div>
      <div class="session-stage" id="session-stage">
        <div id="stage-round">
          <p class="stage-instruction" id="stage-instruction"></p>
          <div id="stage-visual"></div>
          <input id="answer-input" class="answer-input" inputmode="numeric" pattern="-?[0-9]*" autocomplete="off" style="display:none;" />
          <button id="check-btn" class="check-btn" type="button" style="display:none;">Check</button>
          <div id="feedback" class="feedback"></div>
        </div>
        <div id="stage-summary" style="display:none;"></div>
      </div>
    </div>

    <div class="view" data-view="progress">
      <div class="section-label" style="margin-top:0">Trends</div>
      <div class="spark-card">
        <div class="spark-head"><span class="spark-title">Accuracy</span><span class="spark-val" id="accuracy-val"></span></div>
        <svg id="accuracy-spark" viewBox="0 0 240 52" preserveAspectRatio="none"></svg>
      </div>
      <div class="spark-card">
        <div class="spark-head"><span class="spark-title">Math response time</span><span class="spark-val" id="time-val"></span></div>
        <svg id="time-spark" viewBox="0 0 240 52" preserveAspectRatio="none"></svg>
      </div>

      <div class="section-label">Skill meters</div>
      <div class="meters" id="progress-meters"></div>

      <div class="section-label">Mastery by domain</div>
      <div id="mastery-bars"></div>

      <div class="section-label">Last 21 days</div>
      <div class="history-strip" id="progress-week-strip"></div>

      <div class="section-label">Review queue</div>
      <div id="review-list"></div>

      <button class="link-btn" id="home-link" type="button" style="margin-top:1.6rem">← Home</button>
    </div>

  </div>
</div>

<script>
(function () {
  "use strict";

  /* ---------------- state ---------------- */
  var LS_KEY = 'span-state-v1';
  var LEVEL_CAPS = { add:[1,10], sub:[1,10], mul:[1,10], div:[1,10], pct:[1,10], digitFwd:[3,9], digitBwd:[3,8], opspan:[3,7] };

  function defaultState() {
    return {
      xp: 0,
      streak: 0,
      lastPlayedDate: null,
      levels: { add:1, sub:1, mul:1, div:1, pct:1, digitFwd:3, digitBwd:3, opspan:3 },
      streaks: {},
      history: [],
      reviewQueue: [],
      totalSessions: 0,
      theme: null
    };
  }
  function loadState() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (raw) { var parsed = JSON.parse(raw); var d = defaultState(); return Object.assign(d, parsed, { levels: Object.assign(d.levels, parsed.levels || {}) }); }
    } catch (e) {}
    return defaultState();
  }
  function saveState() { try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {} }
  var state = loadState();

  /* ---------------- utilities ---------------- */
  function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function todayStr() { return new Date().toISOString().slice(0, 10); }
  function roundToTen(n) { return Math.round(n / 10) * 10; }

  function pctForLevel(key) {
    var caps = LEVEL_CAPS[key], v = state.levels[key];
    return Math.round(100 * (v - caps[0]) / (caps[1] - caps[0]));
  }
  function memoryPct() { return Math.round((pctForLevel('digitFwd') + pctForLevel('digitBwd')) / 2); }
  function mathPct() { var keys = ['add','sub','mul','div','pct']; var s=0; keys.forEach(function(k){s+=pctForLevel(k);}); return Math.round(s/keys.length); }
  function opspanPct() { return pctForLevel('opspan'); }

  function levelInfo(xp) {
    var level = 1;
    while (xp >= 20 * level * (level + 1)) level++;
    var prevThreshold = level === 1 ? 0 : 20 * (level - 1) * level;
    var nextThreshold = 20 * level * (level + 1);
    return { level: level, into: xp - prevThreshold, span: nextThreshold - prevThreshold };
  }

  function bumpLevel(key, correct) {
    var caps = LEVEL_CAPS[key];
    var cur = state.streaks[key] || 0;
    if (correct) {
      var n = cur + 1;
      state.streaks[key] = n;
      if (n >= 3) { state.levels[key] = Math.min(caps[1], state.levels[key] + 1); state.streaks[key] = 0; }
    } else {
      state.streaks[key] = 0;
      state.levels[key] = Math.max(caps[0], state.levels[key] - 1);
    }
  }

  /* ---------------- math problem generation ---------------- */
  function digitsRange(level) {
    var digits = level <= 2 ? 1 : level <= 5 ? 2 : level <= 8 ? 3 : 4;
    if (digits === 1) return [2, 9];
    return [Math.pow(10, digits - 1), Math.pow(10, digits) - 1];
  }
  function genAdd(level) {
    var r = digitsRange(level), a = randInt(r[0], r[1]), b = randInt(r[0], r[1]);
    return { type: 'add', a: a, b: b, answer: a + b, prompt: a + ' + ' + b };
  }
  function genSub(level) {
    var r = digitsRange(level), a = randInt(r[0], r[1]), b = randInt(r[0], r[1]);
    if (b > a) { var t = a; a = b; b = t; }
    return { type: 'sub', a: a, b: b, answer: a - b, prompt: a + ' − ' + b };
  }
  function genMul(level) {
    var a, b;
    if (level <= 3) { a = randInt(2, 12); b = randInt(2, 12); }
    else if (level <= 6) { a = randInt(10, 99); b = randInt(2, 9); }
    else if (level <= 9) { a = randInt(11, 29); b = randInt(11, 19); }
    else { a = randInt(100, 999); b = randInt(2, 9); }
    return { type: 'mul', a: a, b: b, answer: a * b, prompt: a + ' × ' + b };
  }
  function genDiv(level) {
    var b, quotient;
    if (level <= 3) { b = randInt(2, 12); quotient = randInt(2, 12); }
    else if (level <= 6) { b = randInt(2, 9); quotient = randInt(10, 99); }
    else { b = randInt(2, 12); quotient = randInt(20, 99); }
    var a = b * quotient;
    return { type: 'div', a: a, b: b, answer: quotient, prompt: a + ' ÷ ' + b };
  }
  function genPct(level) {
    var pcts = level <= 3 ? [10,50,25] : level <= 6 ? [10,50,25,20,75] : [10,50,25,20,75,15,5,35];
    var p = pcts[randInt(0, pcts.length - 1)];
    var baseMax = level <= 3 ? 60 : level <= 6 ? 200 : 1000;
    var base = randInt(1, Math.floor(baseMax / 20)) * 20;
    var answer = base * p / 100;
    return { type: 'pct', a: p, b: base, answer: answer, prompt: p + '% of ' + base };
  }
  var GEN_FNS = { add: genAdd, sub: genSub, mul: genMul, div: genDiv, pct: genPct };

  function reconstructProblem(spec) {
    switch (spec.type) {
      case 'add': return { type:'add', a:spec.a, b:spec.b, answer: spec.a+spec.b, prompt: spec.a+' + '+spec.b };
      case 'sub': return { type:'sub', a:spec.a, b:spec.b, answer: spec.a-spec.b, prompt: spec.a+' − '+spec.b };
      case 'mul': return { type:'mul', a:spec.a, b:spec.b, answer: spec.a*spec.b, prompt: spec.a+' × '+spec.b };
      case 'div': return { type:'div', a:spec.a, b:spec.b, answer: spec.a/spec.b, prompt: spec.a+' ÷ '+spec.b };
      case 'pct': return { type:'pct', a:spec.a, b:spec.b, answer: Math.round(spec.b*spec.a/100), prompt: spec.a+'% of '+spec.b };
    }
  }

  function genHint(p) {
    var a = p.a, b = p.b, answer = p.answer;
    if (p.type === 'add') {
      var nb = roundToTen(b), diff = nb - b;
      if (diff === 0) return 'That’s already a round step — add straight across.';
      if (diff > 0) return 'Try ' + a + ' + ' + nb + ' = ' + (a+nb) + ', then subtract ' + diff + ' → ' + answer + '.';
      return 'Try ' + a + ' + ' + nb + ' = ' + (a+nb) + ', then add ' + (-diff) + ' → ' + answer + '.';
    }
    if (p.type === 'sub') {
      var nb2 = roundToTen(b), diff2 = nb2 - b;
      if (diff2 === 0) return 'That’s already a round step — subtract straight across.';
      if (diff2 > 0) return 'Try ' + a + ' − ' + nb2 + ' = ' + (a-nb2) + ', then add ' + diff2 + ' back → ' + answer + '.';
      return 'Try ' + a + ' − ' + nb2 + ' = ' + (a-nb2) + ', then subtract ' + (-diff2) + ' → ' + answer + '.';
    }
    if (p.type === 'mul') {
      if (b === 9 || a === 9) { var big = a===9?b:a; return '×9 trick: ' + big + ' × 10 = ' + (big*10) + ', then subtract ' + big + ' → ' + answer + '.'; }
      if (b === 5 || a === 5) { var oth = a===5?b:a; return '×5 trick: ' + oth + ' × 10 = ' + (oth*10) + ', then halve it → ' + answer + '.'; }
      if (b === 4 || a === 4) { var oth2 = a===4?b:a; return '×4 trick: double ' + oth2 + ' twice → ' + (oth2*2) + ' → ' + (oth2*4) + '.'; }
      var tens = Math.floor(b/10)*10, ones = b%10;
      if (tens > 0 && ones > 0) return 'Split it: ' + a + '×' + tens + ' = ' + (a*tens) + ', plus ' + a + '×' + ones + ' = ' + (a*ones) + ' → ' + answer + '.';
      return 'Break one number into friendlier pieces and add the parts back together → ' + answer + '.';
    }
    if (p.type === 'div') return 'Flip it into multiplication: what × ' + b + ' = ' + a + '? → ' + answer + '.';
    if (p.type === 'pct') { var ten = b/10; return '10% of ' + b + ' = ' + ten + '. Scale that to reach ' + a + '% → ' + answer + '.'; }
    return '';
  }

  function addToReviewQueue(p) {
    state.reviewQueue = state.reviewQueue.filter(function (q) { return !(q.type===p.type && q.a===p.a && q.b===p.b); });
    state.reviewQueue.push({ type: p.type, a: p.a, b: p.b });
    if (state.reviewQueue.length > 15) state.reviewQueue.shift();
  }
  function removeFromReviewQueue(p) {
    state.reviewQueue = state.reviewQueue.filter(function (q) { return !(q.type===p.type && q.a===p.a && q.b===p.b); });
  }

  /* ---------------- digit span / operation span generation ---------------- */
  function genDigitSpan(direction, length) {
    var digits = [];
    for (var i = 0; i < length; i++) digits.push(randInt(0, 9));
    return { type: 'digitspan', direction: direction, digits: digits };
  }
  var OPSPAN_LETTERS = 'BCDFGHJKLMNPQRSTVWXYZ';
  function genOpSpanRound(mathLevel) {
    var ops = ['add','sub','mul'];
    var type = ops[randInt(0, ops.length - 1)];
    var problem = GEN_FNS[type](Math.max(1, mathLevel - 2));
    var showFalse = Math.random() < 0.4;
    var displayedAnswer = showFalse ? problem.answer + randInt(1,4) * (Math.random() < 0.5 ? 1 : -1) : problem.answer;
    var letter = OPSPAN_LETTERS[randInt(0, OPSPAN_LETTERS.length - 1)];
    return { problem: problem, displayedAnswer: displayedAnswer, isTrue: displayedAnswer === problem.answer, letter: letter };
  }

  /* ---------------- session building ---------------- */
  function buildSession() {
    var rounds = [];
    var reviewPulled = state.reviewQueue.slice(0, 3);
    reviewPulled.forEach(function (item) { rounds.push({ kind: 'math', problem: reconstructProblem(item), fromReview: true }); });

    var mathTypes = ['add','sub','mul','div','pct'];
    var weighted = [];
    mathTypes.forEach(function (t) {
      var weight = Math.max(1, 11 - state.levels[t]);
      for (var i = 0; i < weight; i++) weighted.push(t);
    });
    var mathCount = Math.max(0, 6 - reviewPulled.length);
    for (var i = 0; i < mathCount; i++) {
      var t = weighted[randInt(0, weighted.length - 1)];
      rounds.push({ kind: 'math', problem: GEN_FNS[t](state.levels[t]) });
    }

    var dir = state.totalSessions % 2 === 0 ? 'forward' : 'backward';
    var lvl = dir === 'forward' ? state.levels.digitFwd : state.levels.digitBwd;
    rounds.splice(Math.floor(rounds.length / 2), 0, { kind: 'digitspan', spec: genDigitSpan(dir, lvl) });

    var n = state.levels.opspan;
    var opRounds = [];
    var avgLevel = Math.round((state.levels.add + state.levels.mul) / 2);
    for (var j = 0; j < n; j++) opRounds.push(genOpSpanRound(avgLevel));
    rounds.push({ kind: 'opspan', rounds: opRounds });

    return rounds;
  }

  /* ---------------- session runner ---------------- */
  var session = null;

  function startSession() {
    session = { rounds: buildSession(), idx: 0, results: [], mathTimes: [] };
    document.getElementById('stage-round').style.display = '';
    document.getElementById('stage-summary').style.display = 'none';
    showView('session');
    renderRound();
  }

  // The answer input/button are persistent DOM nodes (see initPersistentInput)
  // rather than being recreated per round. Recreating + refocusing them from
  // inside a setTimeout silently fails to reopen the iOS keyboard, since iOS
  // only allows .focus() to summon the keyboard in direct response to a real
  // user gesture. Keeping the same node focused across rounds sidesteps that
  // restriction entirely — the keyboard just never closes.
  var currentSubmit = null;

  function initPersistentInput() {
    var input = document.getElementById('answer-input');
    var btn = document.getElementById('check-btn');
    function submit() {
      if (!currentSubmit) return;
      if (input.value.trim() === '') return;
      var fn = currentSubmit;
      currentSubmit = null;
      fn(input.value.trim());
    }
    btn.addEventListener('click', submit);
    input.addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
  }

  function showAnswerField(opts) {
    opts = opts || {};
    var input = document.getElementById('answer-input');
    var btn = document.getElementById('check-btn');
    input.style.display = '';
    btn.style.display = '';
    input.value = '';
    if (opts.maxLength) input.maxLength = opts.maxLength; else input.removeAttribute('maxlength');
    input.classList.toggle('letters', !!opts.uppercase);
    input.inputMode = opts.uppercase ? 'text' : 'numeric';
    input.focus();
  }

  function hideAnswerField() {
    var input = document.getElementById('answer-input');
    var btn = document.getElementById('check-btn');
    input.style.display = 'none';
    btn.style.display = 'none';
    input.blur();
  }

  function updateSessionProgressDots() {
    var track = document.getElementById('exercise-track');
    if (!track) return;
    var html = '';
    session.rounds.forEach(function (r, i) {
      html += '<span class="' + (i < session.idx ? 'done' : i === session.idx ? 'now' : '') + '"></span>';
    });
    track.innerHTML = html;
  }

  function renderRound() {
    updateSessionProgressDots();
    var round = session.rounds[session.idx];
    var stage = document.getElementById('session-stage');
    if (!round) { renderSummary(); return; }
    if (round.kind === 'math') renderMathRound(round, stage);
    else if (round.kind === 'digitspan') renderDigitSpanRound(round, stage);
    else if (round.kind === 'opspan') renderOpSpanRound(round, stage);
  }

  function renderMathRound(round, stage) {
    var p = round.problem;
    document.getElementById('stage-instruction').textContent = 'Solve';
    document.getElementById('stage-visual').innerHTML = '<div class="equation-big">' + p.prompt + ' = ?</div>';
    document.getElementById('feedback').innerHTML = '';
    showAnswerField({});
    round._startedAt = Date.now();
    currentSubmit = function (val) {
      var correct = Number(val) === p.answer;
      handleMathResult(round, correct);
    };
  }

  function handleMathResult(round, correct) {
    var p = round.problem;
    var ms = Date.now() - round._startedAt;
    session.mathTimes.push(ms);
    bumpLevel(p.type, correct);
    var fb = document.getElementById('feedback');
    if (correct) {
      state.xp += 10;
      session.results.push({ kind: 'math', type: p.type, correct: true, ms: ms });
      if (round.fromReview) removeFromReviewQueue(p);
      fb.innerHTML = '<span class="fb-ok">Correct — +10 XP</span>';
      saveState();
      setTimeout(function () { session.idx++; renderRound(); }, 600);
    } else {
      session.results.push({ kind: 'math', type: p.type, correct: false, ms: ms });
      addToReviewQueue(p);
      hideAnswerField();
      fb.innerHTML = '<span class="fb-bad">Not quite — answer is ' + p.answer + '.</span><p class="hint">' + genHint(p) + '</p><button id="continue-btn" class="continue-btn" type="button">Continue</button>';
      saveState();
      document.getElementById('continue-btn').addEventListener('click', function () { session.idx++; renderRound(); });
    }
  }

  function renderDigitSpanRound(round, stage) {
    var spec = round.spec;
    if (!round._phase) round._phase = 'watch';
    if (round._phase === 'watch') {
      hideAnswerField();
      document.getElementById('stage-instruction').textContent = 'Watch the sequence' + (spec.direction === 'backward' ? ' — you’ll recall it in reverse' : '');
      document.getElementById('stage-visual').innerHTML = '<div class="ds-display" id="ds-display">·</div>';
      document.getElementById('feedback').innerHTML = '';
      var display = document.getElementById('ds-display');
      var i = 0;
      function showNext() {
        if (i >= spec.digits.length) { setTimeout(function () { round._phase = 'recall'; renderRound(); }, 500); return; }
        display.textContent = spec.digits[i];
        display.classList.remove('pulse'); void display.offsetWidth; display.classList.add('pulse');
        i++;
        setTimeout(function () { display.textContent = '·'; setTimeout(showNext, 220); }, 700);
      }
      setTimeout(showNext, 450);
    } else {
      var target = spec.direction === 'forward' ? spec.digits.join('') : spec.digits.slice().reverse().join('');
      document.getElementById('stage-instruction').textContent = 'Enter the digits ' + (spec.direction === 'backward' ? 'in reverse order' : 'in order');
      document.getElementById('stage-visual').innerHTML = '';
      document.getElementById('feedback').innerHTML = '';
      showAnswerField({ maxLength: spec.digits.length });
      currentSubmit = function (val) {
        handleDigitSpanResult(round, val === target, target);
      };
    }
  }

  function handleDigitSpanResult(round, correct, target) {
    var key = round.spec.direction === 'forward' ? 'digitFwd' : 'digitBwd';
    bumpLevel(key, correct);
    if (correct) state.xp += 15;
    session.results.push({ kind: 'digitspan', correct: correct });
    var fb = document.getElementById('feedback');
    saveState();
    if (correct) {
      fb.innerHTML = '<span class="fb-ok">Correct — +15 XP</span>';
      setTimeout(function () { session.idx++; renderRound(); }, 700);
    } else {
      hideAnswerField();
      fb.innerHTML = '<span class="fb-bad">The sequence was ' + target + '.</span><button id="continue-btn" class="continue-btn" type="button">Continue</button>';
      document.getElementById('continue-btn').addEventListener('click', function () { session.idx++; renderRound(); });
    }
  }

  function renderOpSpanRound(round, stage) {
    if (round._phase === undefined) { round._phase = 'rounds'; round._i = 0; round._collected = []; round._correctMath = 0; }
    if (round._phase === 'rounds') {
      if (round._i >= round.rounds.length) { round._phase = 'recall'; renderRound(); return; }
      hideAnswerField();
      var r = round.rounds[round._i];
      document.getElementById('stage-instruction').textContent = 'Verify, then remember the letter (' + (round._i + 1) + ' of ' + round.rounds.length + ')';
      document.getElementById('stage-visual').innerHTML =
        '<div class="equation-big">' + r.problem.prompt + ' = ' + r.displayedAnswer + '?</div>' +
        '<div class="tf-row"><button id="tf-true" class="tf-btn true" type="button">TRUE</button><button id="tf-false" class="tf-btn false" type="button">FALSE</button></div>' +
        '<div class="ds-display" id="letter-display" style="opacity:0">·</div>';
      document.getElementById('feedback').innerHTML = '';
      function answer(choice) {
        var correct = choice === r.isTrue;
        if (correct) round._correctMath++;
        document.getElementById('tf-true').disabled = true;
        document.getElementById('tf-false').disabled = true;
        var ld = document.getElementById('letter-display');
        ld.style.opacity = 1;
        ld.textContent = r.letter;
        round._collected.push(r.letter);
        setTimeout(function () { round._i++; renderRound(); }, 900);
      }
      document.getElementById('tf-true').addEventListener('click', function () { answer(true); });
      document.getElementById('tf-false').addEventListener('click', function () { answer(false); });
    } else {
      document.getElementById('stage-instruction').textContent = 'Type the letters in the order they appeared';
      document.getElementById('stage-visual').innerHTML = '';
      document.getElementById('feedback').innerHTML = '';
      showAnswerField({ maxLength: round._collected.length, uppercase: true });
      currentSubmit = function (val) {
        var target = round._collected.join('');
        handleOpSpanResult(round, val.toUpperCase() === target, target);
      };
    }
  }

  function handleOpSpanResult(round, correct, target) {
    bumpLevel('opspan', correct);
    if (correct) state.xp += 25;
    session.results.push({ kind: 'opspan', correct: correct });
    var fb = document.getElementById('feedback');
    saveState();
    if (correct) {
      fb.innerHTML = '<span class="fb-ok">Correct — +25 XP</span>';
      setTimeout(function () { session.idx++; renderRound(); }, 800);
    } else {
      hideAnswerField();
      fb.innerHTML = '<span class="fb-bad">The order was ' + target + '.</span><button id="continue-btn" class="continue-btn" type="button">Continue</button>';
      document.getElementById('continue-btn').addEventListener('click', function () { session.idx++; renderRound(); });
    }
  }

  function updateStreakOnSessionComplete() {
    var today = todayStr();
    if (state.lastPlayedDate === today) return;
    var yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    state.streak = (state.lastPlayedDate === yesterday) ? state.streak + 1 : 1;
    state.lastPlayedDate = today;
  }

  function renderSummary() {
    var total = session.results.length;
    var correct = session.results.filter(function (r) { return r.correct; }).length;
    var accuracy = total ? Math.round(100 * correct / total) : 0;
    var mathTimes = session.mathTimes;
    var avgMs = mathTimes.length ? Math.round(mathTimes.reduce(function (a,b) { return a+b; }, 0) / mathTimes.length) : null;
    var xpEarned = session.results.reduce(function (sum, r) {
      return sum + (r.correct ? (r.kind === 'math' ? 10 : r.kind === 'digitspan' ? 15 : 25) : 0);
    }, 0);

    updateStreakOnSessionComplete();
    state.totalSessions++;
    state.history.push({ date: todayStr(), accuracy: accuracy, avgMs: avgMs, xpEarned: xpEarned, total: total });
    if (state.history.length > 60) state.history.shift();
    saveState();

    document.getElementById('exercise-track').innerHTML = '';
    hideAnswerField();
    document.getElementById('stage-round').style.display = 'none';
    var summaryEl = document.getElementById('stage-summary');
    summaryEl.style.display = '';
    summaryEl.innerHTML =
      '<div class="summary">' +
      '<p class="stage-instruction">Session complete</p>' +
      '<div class="summary-big">' + accuracy + '%</div>' +
      '<p class="summary-sub">accuracy · +' + xpEarned + ' XP · ' + state.streak + ' day streak</p>' +
      '<button id="done-btn" class="cta-btn" type="button">Back to Home</button>' +
      '</div>';
    document.getElementById('done-btn').addEventListener('click', function () { session = null; showView('home'); renderHome(); });
  }

  /* ---------------- rendering: home / progress ---------------- */
  function meterHTML(label, pct) {
    return '<div class="meter"><svg viewBox="0 0 120 120"><circle class="track" cx="60" cy="60" r="52"></circle>' +
      '<circle class="value" style="--pct:' + pct + '" cx="60" cy="60" r="52"></circle></svg>' +
      '<div class="meter-num">' + pct + '<small>%</small></div>' +
      '<div class="meter-label">' + label + '</div></div>';
  }
  function renderMeters(containerId) {
    var el = document.getElementById(containerId);
    var items = [['Memory', memoryPct()], ['Math', mathPct()], ['Op-Span', opspanPct()]];
    el.innerHTML = items.map(function (it) { return meterHTML(it[0], it[1]); }).join('');
  }

  function renderHistoryStrip(containerId, days) {
    var el = document.getElementById(containerId);
    var set = {};
    state.history.forEach(function (h) { set[h.date] = true; });
    var html = '';
    for (var i = days - 1; i >= 0; i--) {
      var d = new Date(Date.now() - i * 86400000).toISOString().slice(0, 10);
      html += '<i style="' + (set[d] ? 'background:var(--brass);opacity:0.85;border-color:transparent;' : '') + '"></i>';
    }
    el.innerHTML = html;
  }

  function greeting() {
    var h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 18) return 'Good afternoon';
    return 'Good evening';
  }

  function renderHome() {
    document.getElementById('greet-name').textContent = greeting();
    document.getElementById('home-date').textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
    var info = levelInfo(state.xp);
    document.getElementById('cta-meta').textContent = 'LEVEL ' + info.level + ' · ' + info.into + '/' + info.span + ' XP';
    renderMeters('home-meters');
    document.getElementById('review-count').textContent = state.reviewQueue.length;
    document.getElementById('review-chip').style.display = state.reviewQueue.length ? 'flex' : 'none';
    document.getElementById('streak-badge').innerHTML = 'Streak <b>' + state.streak + '</b>';
    renderHistoryStrip('home-history-strip', 14);
  }

  function renderSparkline(svgId, values, kind) {
    var svg = document.getElementById(svgId);
    if (!values.length) { svg.innerHTML = ''; return; }
    var last = values.slice(-10);
    var w = 240, h = 52, pad = 6;
    var min = Math.min.apply(null, last), max = Math.max.apply(null, last);
    var range = (max - min) || 1;
    var stepX = last.length > 1 ? (w - 2*pad) / (last.length - 1) : 0;
    var pts = last.map(function (v, i) {
      var x = pad + i * stepX;
      var norm = (v - min) / range;
      if (kind === 'ms') norm = 1 - norm;
      var y = pad + (1 - norm) * (h - 2*pad);
      return [x, y];
    });
    var pointsAttr = pts.map(function (p) { return p[0] + ',' + p[1]; }).join(' ');
    var endPt = pts[pts.length - 1];
    var color = kind === 'ms' ? 'var(--brass)' : 'var(--teal)';
    svg.innerHTML = '<polyline points="' + pointsAttr + '" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></polyline>' +
      '<circle cx="' + endPt[0] + '" cy="' + endPt[1] + '" r="3.2" fill="' + color + '"></circle>';
  }

  function renderMasteryBars() {
    var el = document.getElementById('mastery-bars');
    var rows = [
      ['Addition','add'], ['Subtraction','sub'], ['Multiplication','mul'], ['Division','div'], ['Percentages','pct'],
      ['Digit span (forward)','digitFwd'], ['Digit span (backward)','digitBwd'], ['Operation span','opspan']
    ];
    el.innerHTML = rows.map(function (row) {
      var pct = pctForLevel(row[1]);
      return '<div class="mastery-row"><span class="mastery-label">' + row[0] + '</span>' +
        '<div class="mastery-track"><div class="mastery-fill" style="--w:' + pct + '%"></div></div>' +
        '<span class="mastery-pct">' + pct + '%</span></div>';
    }).join('');
  }

  function renderReviewList() {
    var el = document.getElementById('review-list');
    if (!state.reviewQueue.length) { el.innerHTML = '<p class="empty-note">Nothing due — clean slate.</p>'; return; }
    var symbols = { add:'+', sub:'−', mul:'×', div:'÷', pct:'%' };
    el.innerHTML = state.reviewQueue.slice(-8).reverse().map(function (q) {
      var label = q.type === 'pct' ? (q.a + '% of ' + q.b) : (q.a + ' ' + symbols[q.type] + ' ' + q.b);
      return '<span class="review-item">' + label + '</span>';
    }).join('');
  }

  function renderProgress() {
    renderMeters('progress-meters');
    renderMasteryBars();
    renderSparkline('accuracy-spark', state.history.map(function (h) { return h.accuracy; }), 'pct');
    renderSparkline('time-spark', state.history.map(function (h) { return h.avgMs; }).filter(function (v) { return v != null; }), 'ms');
    document.getElementById('accuracy-val').textContent = state.history.length ? state.history[state.history.length - 1].accuracy + '%' : '—';
    var lastWithMs = state.history.slice().reverse().filter(function (h) { return h.avgMs != null; })[0];
    document.getElementById('time-val').textContent = lastWithMs ? (lastWithMs.avgMs / 1000).toFixed(2) + 's' : '—';
    renderHistoryStrip('progress-week-strip', 21);
    renderReviewList();
  }

  /* ---------------- view switching / theme / init ---------------- */
  function showView(name) {
    document.querySelectorAll('.view').forEach(function (v) { v.classList.toggle('active', v.getAttribute('data-view') === name); });
    document.getElementById('topbar').classList.toggle('in-session', name === 'session');
  }

  function applyTheme() { if (state.theme) document.documentElement.setAttribute('data-theme', state.theme); }
  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    state.theme = next;
    saveState();
  }

  document.addEventListener('DOMContentLoaded', function () {
    applyTheme();
    initPersistentInput();
    document.getElementById('start-session-btn').addEventListener('click', startSession);
    document.getElementById('progress-link').addEventListener('click', function () { showView('progress'); renderProgress(); });
    document.getElementById('home-link').addEventListener('click', function () { showView('home'); renderHome(); });
    document.getElementById('exit-session-btn').addEventListener('click', function () {
      if (confirm('Leave this session? Progress on the current round won’t be saved.')) { session = null; showView('home'); renderHome(); }
    });
    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
    renderHome();
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () { navigator.serviceWorker.register('./sw.js'); });
  }
})();
</script>
